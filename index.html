<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>名探偵プリキュア てがかりさがしゲーム</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      width: 100vw; height: 100vh; overflow: hidden;
      font-family: 'Hiragino Maru Gothic Pro', 'M PLUS Rounded 1c', 'Comic Sans MS', sans-serif;
      background: #1a1a2e; cursor: none; touch-action: none;
    }

    #cursor {
      position: fixed; width: 44px; height: 44px; pointer-events: none;
      z-index: 9999; font-size: 32px; transform: translate(-30%, -30%);
      transition: transform 0.05s;
    }

    /* ===== TITLE SCREEN ===== */
    #title-screen {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(160deg, #ff6eb4 0%, #c44dff 45%, #4d79ff 100%);
      overflow: hidden;
    }

    .t-stars { position: absolute; inset: 0; pointer-events: none; }
    .t-star {
      position: absolute; opacity: 0;
      animation: twinkle var(--d) var(--dl) ease-in-out infinite;
    }
    @keyframes twinkle {
      0%,100% { opacity:0; transform:scale(0.3); }
      50% { opacity:1; transform:scale(1.4); }
    }

    .logo-wrap { text-align:center; z-index:10; animation: floatY 3s ease-in-out infinite; }
    @keyframes floatY { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }

    .logo-sub { font-size:clamp(14px,3.5vw,22px); color:#ffe135; font-weight:bold;
      text-shadow:1px 1px 0 #cc8800; letter-spacing:2px; margin-bottom:4px; }
    .logo-main { font-size:clamp(32px,7vw,58px); color:white; font-weight:900;
      text-shadow:3px 3px 0 #cc1188, 6px 6px 0 rgba(0,0,0,.25); letter-spacing:4px; }
    .logo-game { font-size:clamp(13px,3vw,20px); color:white; margin-top:8px;
      text-shadow:1px 1px 0 rgba(0,0,0,.4); letter-spacing:1px; }

    .chars-row { display:flex; gap:24px; margin:24px 0; z-index:10; }
    .char-bounce { animation: charB 2s ease-in-out infinite; }
    .char-bounce:nth-child(2) { animation-delay:.4s; }
    @keyframes charB {
      0%,100%{transform:translateY(0) rotate(0deg)}
      30%{transform:translateY(-10px) rotate(-4deg)}
      70%{transform:translateY(-6px) rotate(4deg)}
    }

    .btn-start {
      padding:18px 52px; font-size:clamp(20px,4.5vw,28px); font-weight:900;
      background:linear-gradient(135deg,#ffe135,#ff8c00); border:none; border-radius:60px;
      color:white; text-shadow:1px 1px 0 rgba(0,0,0,.3); cursor:pointer; z-index:10;
      box-shadow:0 6px 24px rgba(0,0,0,.3), 0 0 40px rgba(255,220,0,.4);
      animation:pulsBtn 1.6s ease-in-out infinite; font-family:inherit;
    }
    @keyframes pulsBtn {
      0%,100%{transform:scale(1); box-shadow:0 6px 24px rgba(0,0,0,.3),0 0 40px rgba(255,220,0,.4)}
      50%{transform:scale(1.06); box-shadow:0 8px 32px rgba(0,0,0,.4),0 0 60px rgba(255,220,0,.7)}
    }

    /* ===== GAME SCREEN ===== */
    #game-screen { position:absolute; inset:0; display:none; }

    #stage-bg {
      position:absolute; inset:0;
      transition: background 0.8s;
    }
    .bg-town {
      background:
        linear-gradient(180deg, #87CEEB 0%, #87CEEB 55%, #6abf5e 55%, #5aaf4e 65%, #228B22 65%, #1a6b1a 100%);
    }
    .bg-forest {
      background:
        linear-gradient(180deg, #c8f0b0 0%, #7dcc50 35%, #3d9e20 55%, #1a6b0a 70%, #0d4505 100%);
    }
    .bg-castle {
      background:
        radial-gradient(ellipse at 50% 0%, #4a1888 0%, #1a0a3e 60%, #0d0522 100%);
    }

    #decorations { position:absolute; inset:0; pointer-events:none; }

    /* HUD */
    #hud {
      position:absolute; top:0; left:0; right:0; z-index:100;
      padding:8px 16px; display:flex; justify-content:space-between; align-items:center;
      background:rgba(255,255,255,.18); backdrop-filter:blur(8px);
    }
    #stage-label { font-size:clamp(12px,2.5vw,17px); color:white; font-weight:bold;
      text-shadow:1px 1px 0 rgba(0,0,0,.5); }
    #counter-row { display:flex; gap:6px; }
    .ci {
      font-size:clamp(20px,4vw,28px); opacity:.25;
      transition:opacity .3s, transform .4s cubic-bezier(.175,.885,.32,1.275);
    }
    .ci.got { opacity:1; transform:scale(1.35); }

    /* Guide */
    #guide { position:absolute; bottom:10px; left:14px; z-index:100; display:flex; align-items:flex-end; gap:8px; }
    #bubble {
      background:white; border-radius:18px; padding:9px 14px; max-width:190px;
      font-size:clamp(12px,2.3vw,15px); color:#333; box-shadow:0 3px 12px rgba(0,0,0,.2);
      position:relative; margin-bottom:16px; line-height:1.5;
    }
    #bubble::after {
      content:''; position:absolute; bottom:-9px; left:18px;
      border:9px solid transparent; border-top-color:white; border-bottom:0;
    }

    /* Hint button */
    #hint-btn {
      position:absolute; bottom:14px; right:14px; z-index:100;
      padding:10px 18px; font-size:clamp(13px,2.5vw,16px); font-weight:bold;
      background:linear-gradient(135deg,#ff6eb4,#c44dff); border:none; border-radius:40px;
      color:white; cursor:pointer; font-family:inherit;
      box-shadow:0 4px 14px rgba(0,0,0,.25);
    }

    /* Items */
    .item {
      position:absolute; font-size:clamp(32px,5vw,44px); cursor:pointer;
      user-select:none; z-index:50; padding:10px;
      filter:drop-shadow(1px 1px 3px rgba(0,0,0,.25));
      transition:filter .3s, opacity .3s, transform .2s;
      touch-action: none;
    }
    .item.hidden { opacity:.22; filter:blur(.4px) drop-shadow(0 0 2px rgba(0,0,0,.15)); }
    .item.hint-show { opacity:.55; filter:drop-shadow(0 0 8px gold); }
    .item:hover { transform:scale(1.15); filter:drop-shadow(0 0 10px gold) brightness(1.3); }
    .item.found { animation:itemPop .5s ease-out forwards; pointer-events:none; }
    @keyframes itemPop {
      0%{transform:scale(1); opacity:1;}
      50%{transform:scale(2.2); opacity:1; filter:brightness(2.5) drop-shadow(0 0 20px gold);}
      100%{transform:scale(0); opacity:0;}
    }

    /* Stage clear overlay */
    #stage-clear {
      position:absolute; inset:0; display:none; align-items:center; justify-content:center;
      flex-direction:column; z-index:300;
      background:rgba(255,255,255,.08); backdrop-filter:blur(6px);
    }
    .sc-box {
      text-align:center; animation:scPop .5s cubic-bezier(.175,.885,.32,1.275);
      background:rgba(255,255,255,.15); border-radius:30px; padding:30px 50px;
      box-shadow:0 8px 40px rgba(0,0,0,.3);
    }
    @keyframes scPop {0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
    .sc-title { font-size:clamp(36px,8vw,60px); font-weight:900; color:#ffe135;
      text-shadow:3px 3px 0 #cc8800, 6px 6px 0 rgba(0,0,0,.3); }
    .sc-msg { font-size:clamp(16px,3.5vw,22px); color:white; margin:12px 0 20px;
      text-shadow:1px 1px 0 rgba(0,0,0,.4); }
    .btn-next {
      padding:14px 40px; font-size:clamp(18px,3.5vw,24px); font-weight:900;
      background:linear-gradient(135deg,#ff6eb4,#c44dff); border:none; border-radius:50px;
      color:white; cursor:pointer; font-family:inherit;
      box-shadow:0 6px 20px rgba(0,0,0,.3); animation:pulsBtn 1.6s ease-in-out infinite;
    }

    /* Achievement toast */
    #toast {
      position:fixed; top:60px; right:-300px; z-index:1000;
      background:linear-gradient(135deg,#ffe135,#ff8c00); border-radius:16px;
      padding:10px 20px; color:white; font-weight:bold; font-size:16px;
      box-shadow:0 4px 20px rgba(0,0,0,.3); transition:right .45s cubic-bezier(.175,.885,.32,1.275);
    }
    #toast.show { right:16px; }

    /* ===== VICTORY SCREEN ===== */
    #victory-screen {
      position:absolute; inset:0; display:none; flex-direction:column;
      align-items:center; justify-content:center;
      background:linear-gradient(160deg,#ff6eb4,#c44dff,#4d79ff);
      overflow:hidden;
    }
    #confetti-wrap { position:absolute; inset:0; pointer-events:none; }
    .cf {
      position:absolute;
      animation:cfFall var(--d) var(--dl) linear infinite;
    }
    @keyframes cfFall {
      0%{transform:translateY(-30px) rotate(0deg); opacity:1;}
      100%{transform:translateY(110vh) rotate(720deg); opacity:.5;}
    }

    .v-box { text-align:center; z-index:10; }
    .v-title { font-size:clamp(34px,7.5vw,58px); font-weight:900; color:#ffe135;
      text-shadow:3px 3px 0 #cc8800, 6px 6px 0 rgba(0,0,0,.3);
      animation:scPop .8s cubic-bezier(.175,.885,.32,1.275); margin-bottom:12px; }
    .v-msg { font-size:clamp(16px,3.5vw,22px); color:white; margin-bottom:24px;
      text-shadow:1px 1px 0 rgba(0,0,0,.4); line-height:1.7; }
    .v-chars { display:flex; justify-content:center; gap:20px; margin-bottom:24px; }
    .v-char { animation:charB 1.2s ease-in-out infinite; }
    .v-char:nth-child(2) { animation-delay:.5s; }
    .btn-replay {
      padding:14px 40px; font-size:clamp(18px,3.5vw,24px); font-weight:900;
      background:linear-gradient(135deg,#ffe135,#ff8c00); border:none; border-radius:50px;
      color:white; cursor:pointer; font-family:inherit;
      box-shadow:0 6px 20px rgba(0,0,0,.3); animation:pulsBtn 1.6s ease-in-out infinite;
    }

    /* Floating sparkle animation for scene */
    @keyframes floatSpk {
      0%,100%{transform:translateY(0) scale(1); opacity:.7;}
      50%{transform:translateY(-15px) scale(1.3); opacity:1;}
    }
  </style>
</head>
<body>

<!-- cursor -->

<!-- Achievement toast -->
<div id="toast"><span id="toast-txt">✨ みつけた！</span></div>

<script>
// ============================================================
// AUDIO ENGINE
// ============================================================
let AC = null;
let bgmOn = false;
let bgmTimer = null;

function initAudio() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  if (AC.state === 'suspended') AC.resume();
}

const Hz = {
  C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392.00,A4:440.00,B4:493.88,
  C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:783.99,A5:880.00,B5:987.77,
  C6:1046.50,D6:1174.66,E6:1318.51
};

// Magical girl anime-style melody (original, not from any copyrighted source)
const MELODY = [
  // Phrase 1 — bright opening
  {n:'E5',d:.25},{n:'G5',d:.25},{n:'A5',d:.25},{n:'G5',d:.25},
  {n:'E5',d:.25},{n:'C5',d:.25},{n:'D5',d:.5},
  // Phrase 2
  {n:'G5',d:.25},{n:'A5',d:.25},{n:'C6',d:.25},{n:'B5',d:.25},
  {n:'A5',d:.25},{n:'G5',d:.5},{n:'E5',d:.25},
  // Phrase 3 — rise
  {n:'A5',d:.25},{n:'G5',d:.25},{n:'E5',d:.25},{n:'D5',d:.25},
  {n:'C5',d:.25},{n:'E5',d:.25},{n:'G5',d:.5},
  // Phrase 4 — resolution
  {n:'A5',d:.25},{n:'G5',d:.25},{n:'E5',d:.25},{n:'D5',d:.25},
  {n:'C5',d:.5},{n:'E5',d:.25},{n:'G5',d:.25},
  // Phrase 5 — sparkle ascending
  {n:'E5',d:.125},{n:'G5',d:.125},{n:'A5',d:.125},{n:'C6',d:.125},
  {n:'D6',d:.5},{n:'C6',d:.25},{n:'B5',d:.25},
  // Phrase 6 — triumph
  {n:'A5',d:.25},{n:'C6',d:.25},{n:'E6',d:.5},
  {n:'D6',d:.25},{n:'C6',d:.25},{n:'B5',d:.25},{n:'A5',d:.25},
  // Phrase 7 — gentle
  {n:'G5',d:.25},{n:'E5',d:.25},{n:'C5',d:.25},{n:'D5',d:.25},
  {n:'E5',d:.25},{n:'G5',d:.25},{n:'A5',d:.5},
  // Phrase 8 — close
  {n:'E5',d:.25},{n:'D5',d:.25},{n:'C5',d:.5},{n:'G4',d:.25},{n:'C5',d:.75}
];

const BASS = [
  {n:'C4',d:.5},{n:'G4',d:.5},  {n:'C4',d:.5},{n:'E4',d:.5},
  {n:'F4',d:.5},{n:'C4',d:.5},  {n:'G4',d:.5},{n:'D4',d:.5},
  {n:'A4',d:.5},{n:'E4',d:.5},  {n:'F4',d:.5},{n:'C4',d:.5},
  {n:'G4',d:.5},{n:'E4',d:.5},  {n:'C4',d:.5},{n:'G4',d:.5},
  {n:'A4',d:.5},{n:'E4',d:.5},  {n:'F4',d:.5},{n:'A4',d:.5},
  {n:'G4',d:.5},{n:'D4',d:.5},  {n:'G4',d:.5},{n:'B4',d:.5},
  {n:'E4',d:.5},{n:'G4',d:.5},  {n:'C4',d:.5},{n:'G4',d:.5},
  {n:'F4',d:.5},{n:'C4',d:.5},  {n:'G4',d:.5},{n:'C4',d:.5}
];

const BPM = 148;
const BEAT = 60 / BPM;

function playTone(freq, t, dur, type='triangle', vol=0.15) {
  if (!AC || !freq) return;
  const osc = AC.createOscillator();
  const g = AC.createGain();
  osc.connect(g); g.connect(AC.destination);
  osc.type = type; osc.frequency.value = freq;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.015);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur - 0.01);
  osc.start(t); osc.stop(t + dur);
}

function playNoise(t, dur, vol=0.15, highpass=false) {
  if (!AC) return;
  const buf = AC.createBuffer(1, AC.sampleRate * dur, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0; i<d.length; i++) d[i] = (Math.random()*2-1)*(1-i/d.length);
  const src = AC.createBufferSource(); src.buffer = buf;
  const g = AC.createGain();
  if (highpass) {
    const f = AC.createBiquadFilter(); f.type='highpass'; f.frequency.value=6000;
    src.connect(f); f.connect(g);
  } else { src.connect(g); }
  g.connect(AC.destination);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+dur*0.8);
  src.start(t); src.stop(t+dur);
}

function playKick(t) {
  if (!AC) return;
  const o = AC.createOscillator(); const g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.frequency.setValueAtTime(150, t);
  o.frequency.exponentialRampToValueAtTime(40, t+0.12);
  g.gain.setValueAtTime(0.5, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+0.22);
  o.start(t); o.stop(t+0.22);
}

function scheduleBGM() {
  if (!AC || !bgmOn) return;
  const start = AC.currentTime + 0.05;
  const bd = BEAT * 2; // beat duration in seconds

  // Melody
  let mt = start;
  MELODY.forEach(n => { const dur=n.d*bd*2; playTone(Hz[n.n],mt,dur*0.88,'triangle',0.14); mt+=dur; });
  const totalDur = mt - start;

  // Bass
  let bt = start;
  BASS.forEach(n => { const dur=n.d*bd*2; playTone(Hz[n.n],bt,dur*0.85,'sine',0.11); bt+=dur; });

  // Chord pads (simple)
  const chords = [
    [Hz.C4, Hz.E4, Hz.G4], [Hz.F4, Hz.A4, Hz.C5],
    [Hz.G4, Hz.B4, Hz.D5], [Hz.A4, Hz.C5, Hz.E5],
    [Hz.F4, Hz.A4, Hz.C5], [Hz.G4, Hz.B4, Hz.D5],
    [Hz.E4, Hz.G4, Hz.B4], [Hz.C4, Hz.E4, Hz.G4]
  ];
  chords.forEach((chord, i) => {
    chord.forEach(f => playTone(f, start + i*bd*4, bd*3.8, 'sine', 0.05));
  });

  // Drums
  const bars = 16;
  for (let b=0; b<bars; b++) {
    const bs = start + b * bd * 4;
    playKick(bs);
    playKick(bs + bd*2);
    playNoise(bs + bd, 0.1, 0.18, false);
    playNoise(bs + bd*3, 0.1, 0.18, false);
    for (let h=0; h<8; h++) playNoise(bs + h*bd*0.5, 0.05, 0.06, true);
  }

  bgmTimer = setTimeout(scheduleBGM, (totalDur - 0.15) * 1000);
}

function startBGM() { if (bgmOn) return; bgmOn=true; scheduleBGM(); }
function stopBGM() {
  bgmOn = false;
  if (bgmTimer) { clearTimeout(bgmTimer); bgmTimer=null; }
}

// SFX
function sfxFound() {
  if (!AC) return;
  const t = AC.currentTime;
  [Hz.C5,Hz.E5,Hz.G5,Hz.C6].forEach((f,i) => playTone(f,t+i*0.07,0.22,'triangle',0.3));
  for (let i=0;i<6;i++) playTone(600+Math.random()*1000,t+i*0.03,0.08,'sine',0.08);
}
function sfxClear() {
  if (!AC) return;
  const t = AC.currentTime;
  [[Hz.C5,0],[Hz.E5,.1],[Hz.G5,.2],[Hz.C6,.35],[Hz.E6,.55],[Hz.G5,.75],[Hz.C6,.95]].forEach(([f,d])=>{
    playTone(f,t+d,0.28,'triangle',0.38);
    playTone(f*.5,t+d,0.28,'sine',0.15);
  });
}
function sfxVictory() {
  if (!AC) return;
  const t = AC.currentTime;
  const notes = [Hz.C5,Hz.E5,Hz.G5,Hz.C6,Hz.E6,Hz.G5,Hz.C6,Hz.E6,Hz.G6||Hz.E6*Math.pow(2,1/6)];
  notes.forEach((f,i) => {
    playTone(f,t+i*0.12,0.35,'triangle',0.4);
    playTone(f*.5,t+i*0.12,0.35,'sine',0.2);
    if (i%2===0) playNoise(t+i*0.12,0.1,0.15,true);
  });
}

// ============================================================
// GAME DATA
// ============================================================
const STAGES = [
  {
    name:'ステージ 1：まちのなぞ', bg:'bg-town',
    item:'🔍', count:5,
    msg:'まちのなかに てがかりが ５つ かくれているよ！',
    clearMsg:'まちのなぞを ときあかした！',
    decor:'town'
  },
  {
    name:'ステージ 2：もりのなぞ', bg:'bg-forest',
    item:'⭐', count:5,
    msg:'もりのなかに ほしが ５つ かくれているよ！',
    clearMsg:'もりのなぞを ときあかした！',
    decor:'forest'
  },
  {
    name:'ステージ 3：おしろのなぞ', bg:'bg-castle',
    item:'💎', count:6,
    msg:'おしろのなかに ほうせきが ６つ かくれているよ！',
    clearMsg:'おしろのなぞを ときあかした！',
    decor:'castle'
  }
];

const PRAISE = [
  'やったね！','すごい！','さすが！','きみはえらい！',
  'めいたんてい！','もっとさがして！','かしこいな！'
];

let stage = 0;
let found = 0;
let total = 0;
let hintActive = false;

// ============================================================
// GAME FUNCTIONS
// ============================================================
function startGame() {
  initAudio();
  stage = 0;
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  startBGM();
  loadStage();
}

function loadStage() {
  const s = STAGES[stage];
  found = 0; total = s.count; hintActive = false;
  document.getElementById('stage-label').textContent = s.name;
  document.getElementById('stage-bg').className = 'stage-bg ' + s.bg;
  document.getElementById('stage-clear').style.display = 'none';
  document.getElementById('bubble').textContent = s.msg;
  buildDecor(s.decor);
  buildItems(s);
  buildCounter(s);
}

function buildCounter(s) {
  const row = document.getElementById('counter-row');
  row.innerHTML = '';
  for (let i=0; i<s.count; i++) {
    const sp = document.createElement('span');
    sp.className = 'ci'; sp.textContent = s.item; sp.id = 'ci-'+i;
    row.appendChild(sp);
  }
}

function buildDecor(theme) {
  const c = document.getElementById('decorations');
  c.innerHTML = '';
  const add = (emoji, style) => {
    const d = document.createElement('div');
    d.style.cssText = 'position:absolute;pointer-events:none;' + style;
    d.textContent = emoji; c.appendChild(d);
  };

  if (theme === 'town') {
    // Sky
    ['☁️','☁️','☁️','🌤️'].forEach((e,i)=>add(e,`top:${8+i*6}%;left:${8+i*23}%;font-size:${30+i*8}px;opacity:.85;`));
    // Sun
    add('☀️','top:5%;right:8%;font-size:55px;');
    // Buildings
    ['🏠','🏪','🏦','🏬','🏫','🏠'].forEach((e,i)=>add(e,`bottom:16%;left:${4+i*16}%;font-size:${42+((i%3)-1)*8}px;`));
    // Ground layer
    ['🌳','🚗','🌳','🌸','🌲','🚲'].forEach((e,i)=>add(e,`bottom:6%;left:${3+i*17}%;font-size:28px;`));
    // Birds
    add('🐦','top:18%;left:40%;font-size:20px;');
    add('🐦','top:22%;left:55%;font-size:16px;');
  } else if (theme === 'forest') {
    // Sky glow
    for (let i=0;i<12;i++) add('✦',`top:${3+Math.random()*30}%;left:${Math.random()*90}%;font-size:${8+Math.random()*14}px;color:rgba(255,255,200,.6);animation:floatSpk ${2+Math.random()*2}s ${Math.random()}s ease-in-out infinite;`);
    // Big trees back
    for (let i=0;i<10;i++) add(['🌲','🌳'][i%2],`bottom:${Math.random()*20}%;left:${i*10+Math.random()*6}%;font-size:${44+Math.random()*36}px;opacity:${.5+Math.random()*.5};`);
    // Animals
    ['🦋','🐰','🦊','🌸','🍄','🦔'].forEach((e,i)=>add(e,`bottom:${16+i*5}%;left:${10+i*16}%;font-size:26px;animation:floatSpk ${2.5+i*.4}s ${i*.3}s ease-in-out infinite;`));
    // Flowers
    for (let i=0;i<14;i++) add(['🌸','🌼','🌺','🌷'][i%4],`bottom:${2+Math.random()*12}%;left:${Math.random()*90}%;font-size:${14+Math.random()*16}px;`);
  } else if (theme === 'castle') {
    // Stars
    for (let i=0;i<25;i++) add(['✦','✧','⭐'][i%3],`top:${Math.random()*55}%;left:${Math.random()*90}%;font-size:${7+Math.random()*16}px;color:${['white','#ffe135','#c0d0ff'][i%3]};opacity:${.3+Math.random()*.7};animation:floatSpk ${1.5+Math.random()*2}s ${Math.random()*2}s ease-in-out infinite;`);
    // Moon
    add('🌙','top:6%;right:10%;font-size:65px;');
    // Castle big
    add('🏰','bottom:14%;left:50%;transform:translateX(-50%);font-size:110px;opacity:.55;');
    // Magic items
    ['🔮','✨','🪄','🌟','🔱'].forEach((e,i)=>add(e,`bottom:${8+i*6}%;left:${5+i*22}%;font-size:30px;animation:floatSpk ${2+i*.5}s ${i*.2}s ease-in-out infinite;`));
    // Clouds of magic
    for (let i=0;i<5;i++) add('☁️',`top:${35+i*8}%;left:${i*22}%;font-size:40px;opacity:.2;`);
  }
}

function buildItems(s) {
  const wrap = document.getElementById('items-wrap');
  wrap.innerHTML = '';
  const positions = [];
  let tries = 0;
  while (positions.length < s.count && tries < 600) {
    tries++;
    // Safe zone: avoid guide (bottom-left) and HUD (top)
    const x = 12 + Math.random() * 72;
    const y = 14 + Math.random() * 62;
    // Avoid overlap
    const ok = positions.every(p => {
      const dx=x-p.x, dy=y-p.y;
      return Math.sqrt(dx*dx+dy*dy) > 14;
    });
    if (ok) positions.push({x,y});
  }

  positions.forEach((pos, i) => {
    const el = document.createElement('div');
    el.className = 'item hidden';
    el.style.left = pos.x + '%';
    el.style.top = pos.y + '%';
    el.textContent = s.item;
    el.dataset.idx = i;
    const rot = (Math.random()-0.5)*25;
    el.style.transform = `rotate(${rot}deg)`;

    const onFind = (e) => {
      e.preventDefault(); e.stopPropagation();
      if (el.classList.contains('found') || el.classList.contains('hidden') && !hintActive) {
        // still hidden - but click counts
        if (!el.classList.contains('found')) foundItem(el, i);
      } else if (!el.classList.contains('found')) {
        foundItem(el, i);
      }
    };
    // Always register click regardless of hidden state (for 5yo friendliness)
    el.addEventListener('click', e => { if (!el.classList.contains('found')) foundItem(el, i); });
    el.addEventListener('touchstart', e => { e.preventDefault(); if (!el.classList.contains('found')) foundItem(el, i); }, {passive:false});

    wrap.appendChild(el);
  });
}

function foundItem(el, idx) {
  initAudio();
  el.classList.remove('hidden','hint-show');
  el.classList.add('found');
  found++;
  sfxFound();
  spawnSparkles(el);

  // Update counter
  const ci = document.getElementById('ci-'+  (found-1));
  if (ci) ci.classList.add('got');

  // Praise
  const praise = PRAISE[Math.floor(Math.random()*PRAISE.length)];
  document.getElementById('bubble').textContent = praise + ' ' + found + '/' + total + ' みつけた！';
  showToast('✨ みつけた！ ' + found + '/' + total);

  if (found >= total) setTimeout(stageClear, 700);
}

function showHint() {
  hintActive = true;
  document.querySelectorAll('.item.hidden').forEach(el => el.classList.add('hint-show'));
  document.getElementById('bubble').textContent = 'ここにかくれているよ！ みつけてね！';
  setTimeout(() => {
    hintActive = false;
    document.querySelectorAll('.item.hint-show').forEach(el => el.classList.remove('hint-show'));
  }, 2500);
}

function spawnSparkles(el) {
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  const emojis = ['✨','⭐','💫','🌟','💖','✦'];
  for (let i=0;i<10;i++) {
    const sp = document.createElement('div');
    const angle = (i/10)*Math.PI*2;
    const dist = 35 + Math.random()*40;
    const tx = Math.cos(angle)*dist, ty = Math.sin(angle)*dist;
    const dur = 0.6 + Math.random()*0.3;
    sp.style.cssText = `position:fixed;left:${cx}px;top:${cy}px;font-size:${12+Math.random()*18}px;
      pointer-events:none;z-index:500;transform-origin:center;`;
    sp.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    const anim = sp.animate([
      {transform:'translate(0,0) scale(0) rotate(0deg)', opacity:1},
      {transform:`translate(${tx}px,${ty}px) scale(1.6) rotate(${Math.random()*360}deg)`, opacity:0}
    ], {duration: dur*1000, easing:'ease-out'});
    document.body.appendChild(sp);
    anim.onfinish = () => sp.remove();
  }
}

function showToast(txt) {
  const t = document.getElementById('toast');
  document.getElementById('toast-txt').textContent = txt;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}

function stageClear() {
  sfxClear();
  const s = STAGES[stage];
  document.getElementById('sc-msg').textContent = s.clearMsg;
  const last = stage >= STAGES.length - 1;
  document.getElementById('btn-next').textContent = last ? '🎉 ゲームクリア！' : 'つぎへ ➡️';
  const clearEl = document.getElementById('stage-clear');
  clearEl.style.display = 'flex';
}

function nextStage() {
  stage++;
  if (stage >= STAGES.length) { showVictory(); return; }
  loadStage();
}

function showVictory() {
  stopBGM();
  document.getElementById('game-screen').style.display = 'none';
  const vs = document.getElementById('victory-screen');
  vs.style.display = 'flex';
  sfxVictory();
  spawnConfetti();
}

function spawnConfetti() {
  const wrap = document.getElementById('confetti-wrap');
  wrap.innerHTML = '';
  const emojis=['🌟','⭐','💖','🎉','✨','💫','🌸','🏅','💎'];
  const colors=['#ff6eb4','#c44dff','#4d79ff','#ffe135','#ff8c00','#4CAF50'];
  for (let i=0;i<60;i++) {
    const el = document.createElement('div');
    el.className = 'cf';
    const isEmoji = Math.random()>.5;
    if (isEmoji) {
      el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      el.style.fontSize = (12+Math.random()*20)+'px';
    } else {
      el.style.background = colors[Math.floor(Math.random()*colors.length)];
      el.style.width = (8+Math.random()*12)+'px'; el.style.height=(8+Math.random()*12)+'px';
      el.style.borderRadius = Math.random()>.5?'50%':'3px';
    }
    el.style.left = Math.random()*100+'%';
    el.style.setProperty('--d',(2+Math.random()*3)+'s');
    el.style.setProperty('--dl',(Math.random()*2)+'s');
    wrap.appendChild(el);
  }
}

function replayGame() {
  document.getElementById('victory-screen').style.display = 'none';
  document.getElementById('title-screen').style.display = 'flex';
  stopBGM();
}

// ============================================================
// CURSOR & TITLE INIT
// ============================================================
document.addEventListener('mousemove', e => {
  const c = document.getElementById('cursor');
  c.style.left = e.clientX+'px'; c.style.top = e.clientY+'px';
});

// Title stars
(function() {
  const wrap = document.getElementById('t-stars');
  const arr = ['⭐','✨','💫','🌟','✦','💖'];
  for (let i=0;i<35;i++) {
    const s = document.createElement('div');
    s.className = 't-star';
    s.style.left = Math.random()*95+'%';
    s.style.top  = Math.random()*95+'%';
    s.style.fontSize = (10+Math.random()*18)+'px';
    s.style.setProperty('--d',(1.5+Math.random()*2.5)+'s');
    s.style.setProperty('--dl',(Math.random()*3)+'s');
    s.textContent = arr[Math.floor(Math.random()*arr.length)];
    wrap.appendChild(s);
  }
})();
</script>
