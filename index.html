<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>名探偵プリキュア ゲームランド</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Maru Gothic ProN','BIZ UDPGothic',sans-serif;
  background:#090018;
  background-image:radial-gradient(#ffffff09 1px,transparent 1px),radial-gradient(#ffffff05 1px,transparent 1px);
  background-size:28px 28px,56px 56px;background-position:0 0,14px 14px;
  color:#fff;min-height:100vh;overflow-x:hidden}

/* ===== キャラ画像共通 ===== */
.ci-wrap{display:inline-block;background:#fff;border-radius:12px;overflow:hidden;line-height:0;vertical-align:bottom}
.ci-wrap img{display:block;object-fit:cover;mix-blend-mode:multiply}

/* ===== 魔法パーティクル ===== */
.hub-sparkle{position:fixed;pointer-events:none;z-index:0;animation-name:floatSparkle;animation-timing-function:linear;animation-fill-mode:forwards}
@keyframes floatSparkle{from{transform:translateY(0)rotate(0deg);opacity:.85}to{transform:translateY(-110vh)rotate(540deg);opacity:0}}

/* ===== HUB ===== */
#hub{min-height:100vh;padding:0 0 40px;position:relative;z-index:1}
.hub-header{
  background:linear-gradient(180deg,#100035 0%,#2a0075 30%,#4a00aa 58%,#220060 100%);
  padding:20px 16px 28px;text-align:center;
  box-shadow:0 6px 40px #9900ffcc;
  position:relative;overflow:hidden;z-index:2;
}
/* 背景魔法陣リング */
.hub-header::before{
  content:'';position:absolute;width:360px;height:360px;
  left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;
  border:1px solid #ff66cc33;
  box-shadow:0 0 0 18px #aa33ff0d,0 0 0 36px #ff66cc09,0 0 0 60px #aa33ff05,0 0 80px 80px #6600cc22 inset;
  animation:ringPulse 5s ease-in-out infinite;pointer-events:none;
}
@keyframes ringPulse{0%,100%{opacity:.5;transform:translate(-50%,-50%)scale(1)}50%{opacity:1;transform:translate(-50%,-50%)scale(1.05)}}
/* 下部装飾ライン */
.hub-header::after{
  content:'✦  💖  ✦  💫  ✦  🌟  ✦  💫  ✦  💖  ✦';
  position:absolute;bottom:6px;left:0;right:0;
  text-align:center;font-size:10px;color:#ff88cc55;letter-spacing:3px;pointer-events:none;
}
.hub-badge{
  display:inline-block;
  background:linear-gradient(135deg,#ff44bb,#9922ff);
  border-radius:24px;padding:5px 22px;font-size:13px;font-weight:900;
  color:#fff;margin-bottom:10px;
  box-shadow:0 0 18px #ff66ccaa,0 2px 6px #00000055;
  letter-spacing:1px;position:relative;z-index:1;
}
.hub-title{
  font-size:clamp(22px,6.5vw,46px);font-weight:900;
  background:linear-gradient(90deg,#ff88ff,#ffee44,#88ffff,#ff44cc,#ff88ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-size:250%;animation:gradMove 3.5s linear infinite;
  line-height:1.15;position:relative;z-index:1;
  text-shadow:none;
}
@keyframes gradMove{to{background-position:250%}}
.hub-subtitle{font-size:12px;color:#cc99ff;margin-top:6px;position:relative;z-index:1;letter-spacing:.5px}
.hub-tagline{font-size:11px;color:#ff99cc88;margin-top:4px;position:relative;z-index:1}

/* キャラクターカード（大型表示） */
.hub-chars{display:flex;justify-content:center;gap:10px;margin-top:18px;flex-wrap:wrap;position:relative;z-index:1}
.hub-char-card{display:flex;flex-direction:column;align-items:center;gap:5px}
.hub-char-wrap{
  display:inline-block;background:#fff;border-radius:16px;overflow:hidden;line-height:0;
  border:3px solid #9966ff;
  box-shadow:0 0 0 3px #33006666;
  animation:charB 2s ease-in-out infinite;
  transition:transform .2s;
}
.hub-char-card:nth-child(2) .hub-char-wrap{animation-delay:.25s}
.hub-char-card:nth-child(3) .hub-char-wrap{animation-delay:.5s}
.hub-char-card:nth-child(4) .hub-char-wrap{animation-delay:.75s}
.hub-char-wrap img{width:108px;height:130px;object-fit:cover;mix-blend-mode:multiply;display:block}
.hub-char-name{font-size:9px;font-weight:900;text-align:center;line-height:1.3;max-width:114px;color:#ffccff}
@keyframes charB{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}

.cat-tabs{display:flex;flex-wrap:wrap;gap:6px;padding:12px 16px;justify-content:center;background:#150030}
.cat-tab{padding:6px 14px;border-radius:20px;border:2px solid #6633aa;background:#2a0055;color:#cc99ff;font-size:13px;font-weight:700;cursor:pointer;transition:.2s}
.cat-tab.active,.cat-tab:hover{background:#6633ff;color:#fff;border-color:#aa66ff}
.games-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:14px;max-width:900px;margin:0 auto}
@media(max-width:600px){.games-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:400px){.games-grid{grid-template-columns:repeat(2,1fr)}}
.game-tile{background:linear-gradient(145deg,#2a005a,#440088);border:2px solid #6633aa;border-radius:14px;padding:12px 8px 10px;text-align:center;cursor:pointer;transition:.2s;position:relative}
.game-tile:hover{transform:scale(1.05);border-color:#aa66ff;box-shadow:0 0 16px #9933ff88}
.game-tile:active{transform:scale(.97)}
.game-tile.hidden{display:none}
.game-tile.hard-tile{background:linear-gradient(145deg,#3a0010,#660022);border-color:#cc2244}
.game-tile.hard-tile:hover{border-color:#ff4466;box-shadow:0 0 16px #ff224488}
.game-icon{font-size:30px;line-height:1;margin-bottom:5px}
.game-name{font-size:10px;font-weight:700;color:#eeddff;line-height:1.3}
.game-num{position:absolute;top:4px;left:6px;font-size:9px;color:#9966cc;font-weight:700}
.game-hard-badge{position:absolute;top:4px;right:5px;background:linear-gradient(135deg,#ff2244,#880011);color:#fff;font-size:8px;font-weight:900;padding:1px 5px;border-radius:6px}

/* ===== キャラクター選択モーダル ===== */
#charSelectModal{display:none;position:fixed;inset:0;z-index:200;background:#000000cc;align-items:center;justify-content:center;padding:16px;overflow-y:auto}
#charSelectModal.show{display:flex}
.char-select-box{background:linear-gradient(145deg,#1a0040,#2a0055);border:3px solid #9933ff;border-radius:24px;padding:20px 16px 24px;max-width:460px;width:100%;box-shadow:0 0 40px #9933ff88}
.char-select-title{font-size:20px;font-weight:900;text-align:center;color:#ffccff;margin-bottom:4px}
.char-select-sub{font-size:13px;text-align:center;color:#cc99ff;margin-bottom:10px}
.char-select-game{font-size:14px;font-weight:700;text-align:center;color:#ffff88;margin-bottom:14px;background:#2a005a;border-radius:10px;padding:8px 10px;border:1px solid #6633aa}
.char-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.char-card{border-radius:16px;padding:12px 8px 10px;text-align:center;cursor:pointer;transition:all .2s;border:3px solid transparent;background:linear-gradient(145deg,#22004a,#380066);position:relative;overflow:hidden}
.char-card:hover{transform:scale(1.03);background:linear-gradient(145deg,#2d0060,#4a0088)}
.char-card.active-char{transform:scale(1.04)}
/* 選択された以外のカードを少し暗くしない → すべて同じ明るさ */
.char-card-img-wrap{display:inline-block;background:#fff;border-radius:10px;overflow:hidden;line-height:0;margin-bottom:6px}
.char-card-img-wrap img{width:72px;height:86px;object-fit:cover;mix-blend-mode:multiply;display:block}
.char-card-name{font-size:12px;font-weight:900;line-height:1.3;margin-bottom:3px}
.char-card-desc{font-size:10px;color:#ccbbee;line-height:1.4}
.char-card .selected-badge{display:none;position:absolute;top:6px;right:6px;background:#ff66cc;color:#fff;font-size:10px;font-weight:900;padding:2px 6px;border-radius:8px}
.char-card.active-char .selected-badge{display:block}
.char-select-start{display:block;width:100%;margin-top:14px;padding:14px;background:linear-gradient(135deg,#ff66cc,#9933ff);border:none;color:#fff;font-size:18px;font-weight:900;border-radius:16px;cursor:pointer;box-shadow:0 0 16px #ff66cc88;transition:.15s}
.char-select-start:disabled{background:#443355;color:#776688;cursor:not-allowed;box-shadow:none}
.char-select-start:not(:disabled):hover{transform:scale(1.02)}
.char-select-cancel{display:block;width:100%;margin-top:8px;padding:9px;background:transparent;border:2px solid #6633aa;color:#cc99ff;font-size:14px;font-weight:700;border-radius:12px;cursor:pointer}
.char-select-cancel:hover{border-color:#9966cc;color:#fff}

/* ===== ゲーム画面 ===== */
#gameScreen{display:none;min-height:100vh;flex-direction:column}
.game-topbar{background:linear-gradient(135deg,#2d0066,#6600cc);padding:9px 14px;display:flex;align-items:center;gap:8px;box-shadow:0 4px 12px #9900ff66;flex-shrink:0}
.back-btn{background:#ff66cc;border:none;color:#fff;font-size:18px;width:34px;height:34px;border-radius:50%;cursor:pointer;font-weight:900;flex-shrink:0;line-height:1}
.back-btn:hover{background:#ff44aa}
.game-title-bar{font-size:15px;font-weight:900;flex:1;text-align:center;background:linear-gradient(90deg,#ff88ff,#88ffff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.score-bar{font-size:14px;font-weight:700;color:#ffff88;flex-shrink:0;white-space:nowrap}
#gameArea{flex:1;position:relative;overflow:hidden}

/* ===== キャラウィジェット ===== */
#charWidget{position:absolute;bottom:10px;left:10px;z-index:30;display:flex;align-items:flex-end;gap:8px}
.widget-img-wrap{display:inline-block;background:#fff;border-radius:10px;overflow:hidden;line-height:0;cursor:pointer;transition:.15s;box-shadow:0 2px 8px #00000066}
.widget-img-wrap:hover{transform:scale(1.08)}
.widget-img-wrap:active{transform:scale(.93)}
.widget-img-wrap img{width:54px;height:65px;object-fit:cover;mix-blend-mode:multiply;display:block}
#speechBubble{background:#fffffff0;color:#220044;border-radius:16px 16px 16px 4px;padding:8px 11px;font-size:12px;font-weight:700;max-width:170px;line-height:1.5;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 3px 10px #00000055;position:relative}
#speechBubble.show{opacity:1}
#speechBubble::after{content:'';position:absolute;bottom:8px;left:-7px;border:6px solid transparent;border-right-color:#fffffff0}
#speechBubble .char-name-tag{font-size:10px;font-weight:900;margin-bottom:3px;opacity:.7}

/* ===== 各ゲーム共通 ===== */
.find-bg{width:100%;height:100%;position:absolute;top:0;left:0;display:flex;align-items:center;justify-content:center;font-size:90px;opacity:.15;user-select:none;pointer-events:none}
.find-item{position:absolute;font-size:clamp(28px,5vw,44px);cursor:pointer;user-select:none;animation:itemPop .3s ease}
.find-item:hover{transform:scale(1.2)}
.find-item.found{animation:scPop .4s ease forwards;pointer-events:none}
@keyframes itemPop{from{transform:scale(0)}to{transform:scale(1)}}
@keyframes scPop{0%{transform:scale(1)}50%{transform:scale(1.8)}100%{transform:scale(0);opacity:0}}
.find-counter{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:#2a005acc;border-radius:12px;padding:5px 16px;font-size:18px;font-weight:900;z-index:5}

.tap-obj{position:absolute;font-size:clamp(36px,8vw,56px);cursor:pointer;user-select:none}
.tap-obj:active{transform:scale(.8)}
.miss-bar{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:13px;color:#ffcccc;background:#2a005acc;padding:4px 12px;border-radius:10px;z-index:5;white-space:nowrap}
.miss-flash{position:absolute;inset:0;background:#ff000033;pointer-events:none;animation:flashFade .3s forwards;z-index:20}
@keyframes flashFade{to{opacity:0}}

.card-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:center;padding:16px;align-content:center;width:100%}
.card{width:clamp(58px,12vw,88px);height:clamp(72px,15vw,108px);border-radius:12px;background:linear-gradient(135deg,#440088,#220044);border:3px solid #9933ff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:clamp(26px,6vw,42px);transition:.4s transform;transform-style:preserve-3d;position:relative;flex-shrink:0}
.card.flipped{transform:rotateY(180deg)}
.card-back,.card-front{position:absolute;inset:0;border-radius:10px;display:flex;align-items:center;justify-content:center;backface-visibility:hidden}
.card-back{background:linear-gradient(135deg,#440088,#220044)}
.card-front{background:linear-gradient(135deg,#660099,#aa22ff);transform:rotateY(180deg)}
.card.matched{border-color:#ffff44;background:linear-gradient(135deg,#664400,#ff9900);pointer-events:none}

.count-stage{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;padding:20px;gap:14px}
.count-emojis{font-size:clamp(26px,5.5vw,42px);letter-spacing:4px;line-height:1.7;text-align:center;max-width:92%}
.count-question{font-size:19px;font-weight:900;color:#ffff88;text-align:center}
.count-choices{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.count-btn{width:76px;height:76px;border-radius:50%;border:4px solid #9933ff;background:linear-gradient(135deg,#440088,#6600cc);font-size:26px;font-weight:900;color:#fff;cursor:pointer;transition:.15s;flex-shrink:0}
.count-btn:hover{transform:scale(1.1)}
.count-btn.correct{background:linear-gradient(135deg,#006600,#00cc44)!important;border-color:#00ff66!important}
.count-btn.wrong{background:linear-gradient(135deg,#660000,#cc0044)!important;border-color:#ff0044!important;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

.color-stage{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;gap:18px;padding:20px}
.color-target{width:90px;height:90px;border-radius:50%;border:5px solid #fff;box-shadow:0 0 16px currentColor;margin:0 auto}
.color-question{font-size:17px;font-weight:700;color:#eeddff;text-align:center}
.color-choices{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.color-btn{width:66px;height:66px;border-radius:50%;border:4px solid rgba(255,255,255,.4);cursor:pointer;transition:.15s;flex-shrink:0}
.color-btn:hover{transform:scale(1.15);border-color:#fff}

.piano-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;gap:14px;padding:14px}
.piano-keys{display:flex;gap:5px;justify-content:center}
.pkey{width:clamp(42px,9vw,62px);height:clamp(95px,18vw,140px);border-radius:0 0 10px 10px;border:3px solid #330066;cursor:pointer;transition:.1s;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;font-size:11px;font-weight:900;color:#fff;text-shadow:0 1px 3px #000;flex-shrink:0}
.pkey:active,.pkey.pressed{filter:brightness(.65);transform:scaleY(.96)}
.piano-hint{font-size:13px;color:#ffff88;text-align:center;font-weight:700}
#pianoMsg{font-size:18px;color:#cc99ff;text-align:center;min-height:28px;font-weight:700}

.rhythm-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;gap:18px;padding:18px}
.rhythm-targets{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.rh-target{width:clamp(62px,14vw,86px);height:clamp(62px,14vw,86px);border-radius:50%;border:4px solid #9933ff;background:#2a005a;font-size:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s;flex-shrink:0;user-select:none}
.rh-target.lit{background:#ff66cc;border-color:#fff;box-shadow:0 0 20px #ff66cc}
.rh-target:active{transform:scale(.88)}
.rhythm-info{font-size:17px;font-weight:900;color:#ffff88;text-align:center}

.balloon{position:absolute;font-size:clamp(38px,8vw,60px);cursor:pointer;animation:floatUp linear;user-select:none}
@keyframes floatUp{from{transform:translateY(0)}to{transform:translateY(-110vh)}}

.whack-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px;max-width:380px;margin:0 auto}
.hole{background:#220044;border-radius:50%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:clamp(34px,8vw,52px);cursor:pointer;border:4px solid #6633aa;overflow:hidden;transition:.1s;user-select:none}
.hole.active{background:#440088;border-color:#ff66cc;animation:popUp .15s ease}
@keyframes popUp{from{transform:scale(.2)}to{transform:scale(1)}}
.hole:active{transform:scale(.84)}

.puzzle-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;gap:12px;padding:12px}
.puzzle-board{display:grid;gap:5px;background:#2a005a;padding:8px;border-radius:12px;border:3px solid #9933ff}
.puzzle-piece{border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;border:3px solid transparent;user-select:none}
.puzzle-piece.selected{border-color:#ffff44;transform:scale(1.06)}
.puzzle-piece.empty{background:#110022!important;cursor:default}
.puzzle-piece:not(.empty):hover{border-color:#aa66ff}

.sort-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;gap:16px;padding:16px}
.sort-items{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;align-items:flex-end}
.sort-item{border-radius:12px;background:linear-gradient(135deg,#440088,#6600cc);border:3px solid #9933ff;cursor:grab;display:flex;align-items:center;justify-content:center;flex-shrink:0;user-select:none;transition:.15s}
.sort-item.correct-pos{border-color:#00ff66;background:linear-gradient(135deg,#003300,#006600)}
.sort-hint{font-size:14px;color:#cc99ff;text-align:center;font-weight:700}

.stamp-wrap{display:flex;flex-direction:column;align-items:center;height:100%;padding:10px;gap:8px}
.stamp-canvas-container{flex:1;background:#fff0ff;border-radius:12px;border:3px solid #9933ff;width:100%;position:relative;overflow:hidden;min-height:180px}
.stamp-canvas-container canvas{position:absolute;inset:0;width:100%;height:100%;cursor:crosshair}
.stamp-palette{display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
.stamp-btn{font-size:26px;background:#2a005a;border:3px solid #6633aa;border-radius:10px;padding:4px 7px;cursor:pointer;transition:.15s;line-height:1}
.stamp-btn:hover,.stamp-btn.selected{border-color:#ff66cc;background:#440088;transform:scale(1.1)}
.clear-btn{padding:6px 14px;background:#ff3366;border:3px solid #ff6699;color:#fff;border-radius:10px;cursor:pointer;font-size:12px;font-weight:700}

/* ===== リザルト ===== */
.result-overlay{position:absolute;inset:0;background:#000000bb;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:50;padding:20px;overflow-y:auto}
.result-title{font-size:clamp(26px,7vw,46px);font-weight:900;background:linear-gradient(90deg,#ff88ff,#ffff44,#88ffff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;line-height:1.2}
.result-char-row{display:flex;align-items:flex-end;gap:12px}
.result-char-img-wrap{display:inline-block;background:#fff;border-radius:14px;overflow:hidden;line-height:0}
.result-char-img-wrap img{width:100px;height:120px;object-fit:cover;mix-blend-mode:multiply;display:block}
.result-char-msg{background:#ffffffee;color:#220044;border-radius:16px 16px 16px 4px;padding:11px 14px;font-size:14px;font-weight:700;max-width:190px;line-height:1.6;box-shadow:0 3px 10px #00000044}
.result-score{font-size:26px;font-weight:900;color:#ffff44}
.result-btn{padding:12px 32px;background:linear-gradient(135deg,#ff66cc,#9933ff);border:none;color:#fff;font-size:18px;font-weight:900;border-radius:28px;cursor:pointer;box-shadow:0 0 18px #ff66cc88;transition:.15s}
.result-btn:hover{transform:scale(1.05)}
.result-btn.retry{background:linear-gradient(135deg,#33cc66,#006633)}
.confetti{position:absolute;width:8px;height:8px;border-radius:2px;animation:confettiFall linear forwards;pointer-events:none}
@keyframes confettiFall{from{transform:translateY(-10px) rotate(0deg);opacity:1}to{transform:translateY(100vh) rotate(720deg);opacity:0}}

.float-score{position:absolute;font-size:20px;font-weight:900;color:#ffff44;pointer-events:none;animation:floatScore .8s ease forwards;z-index:15;text-shadow:0 2px 4px #000}
@keyframes floatScore{from{transform:translateY(0);opacity:1}to{transform:translateY(-55px);opacity:0}}
.pulsBtn{animation:pulsBtn 1.2s ease-in-out infinite}
@keyframes pulsBtn{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}

/* ===== 2Pゲーム共通 ===== */
.p2-split{display:flex;width:100%;height:100%;position:absolute;top:0;left:0}
.p2-side{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
.p2-side.p1-zone{border-right:3px solid #ff66cc;background:#1a0028}
.p2-side.p2-zone{border-left:3px solid #4488ff;background:#001828}
.p2-label{position:absolute;top:8px;left:50%;transform:translateX(-50%);font-size:13px;font-weight:900;padding:3px 14px;border-radius:12px;z-index:5;white-space:nowrap}
.p2-score-big{font-size:28px;font-weight:900;color:#ffff88;text-align:center;margin-top:8px}
.p2-tap-obj{position:absolute;font-size:clamp(36px,10vw,56px);cursor:pointer;user-select:none}
.p2-tap-obj:active{transform:scale(.8)}

var AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq,dur,type,vol,delay){
  type=type||'sine';vol=vol||.3;delay=delay||0;
  var o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(0,AC.currentTime+delay);
  g.gain.linearRampToValueAtTime(vol,AC.currentTime+delay+.01);
  g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+delay+dur);
  o.start(AC.currentTime+delay);o.stop(AC.currentTime+delay+dur+.05);
}
function sfxSuccess(){beep(523,.1,'square',.28);beep(659,.1,'square',.28,.1);beep(784,.2,'square',.28,.2);}
function sfxMiss(){beep(180,.25,'sawtooth',.25);}
function sfxComplete(){[523,659,784,1047].forEach(function(f,i){beep(f,.18,'square',.28,i*.13);});}
function sfxTap(){beep(880,.05,'square',.18);}
function sfxCard(){beep(660,.1,'sine',.28);}

var bgmTimers=[];var bgmOn=false;
function stopBGM(){bgmOn=false;bgmTimers.forEach(function(t){clearInterval(t);clearTimeout(t);});bgmTimers=[];}
function pn(f,d,t,v,dt){if(!bgmOn||!f)return;beep(f,d,t||'sine',v||.09,dt||0);}

// ============================================================
// BGM: メロディ+和音+バスの3層構造で本格的なサウンド
// 各カテゴリ専用テーマ曲
// ============================================================

// 共通ビルダー: mel=メロディ配列, bas=バス配列(4拍ごと), tempo, mDur=音符長, mType=波形
// h2=追加ハーモニー比率(例:1.498=5度上, 1.26=長3度上), bVol=バス音量
function mkBGM(mel,bas,tempo,mDur,mType,h2,bVol){
  var i=0;
  bgmTimers.push(setInterval(function(){
    if(!bgmOn)return;
    var f=mel[i%mel.length];
    pn(f,mDur,mType||'triangle',.11);        // メロディ
    pn(f*.749,mDur*.82,'sine',.055);         // 完全4度下ハーモニー
    if(h2)pn(f*h2,mDur*.76,'sine',.046);    // 追加ハーモニー
    if(i%4===0)pn(bas[Math.floor(i/4)%bas.length],mDur*2.4,'sine',bVol||.10); // バス
    i++;
  },tempo));
}

// ============================================================

// ============================================================
function buildCharCards(){
  var html='';
  CHARS.forEach(function(ch,i){
    var badge='';
    if(is2P){
      if(i===selectedCharIdx) badge='<div class="selected-badge" style="background:#ff66cc">1P</div>';
      else if(i===selectedChar2Idx) badge='<div class="selected-badge" style="background:#4488ff">2P</div>';
    } else {
      if(i===selectedCharIdx) badge='<div class="selected-badge">✓ えらんだ！</div>';
    }
    var isActive=(i===selectedCharIdx)||(is2P&&i===selectedChar2Idx);
    var borderColor=!isActive?'transparent':i===selectedCharIdx?ch.color:'#4488ff';
    var shadow=!isActive?'none':i===selectedCharIdx?'0 0 20px '+ch.color:'0 0 20px #4488ff';
    html+='<div class="char-card'+(isActive?' active-char':'')+'" id="charCard'+i+'"'
      +' style="border-color:'+borderColor+';box-shadow:'+shadow+'"'
      +' onclick="selectChar('+i+')">';
    html+=badge;
    html+='<div class="char-card-img-wrap"><img src="'+ch.img+'" alt="'+ch.name+'" onerror="this.parentNode.style.display=\'none\'"></div>';
    html+='<div class="char-card-name" style="color:'+ch.color+'">'+ch.name+'</div>';
    html+='<div class="char-card-desc">'+ch.desc.replace(/\n/g,'<br>')+'</div>';
    html+='</div>';
  });
  document.getElementById('charCards').innerHTML=html;
  if(is2P){
    var info=document.getElementById('modal2pInfo');
    info.style.display='block';
    info.innerHTML='🟥<b style="color:#ff88cc">1P</b>と🟦<b style="color:#88aaff">2P</b>のキャラをえらんでね！<br>（タップするたびに1P→2Pじゅんにえらびます）';
  }
}
var p2SelectMode=1; // 1=1P selecting, 2=2P selecting
function selectChar(idx){
  if(is2P){
    if(p2SelectMode===1){
      selectedCharIdx=idx;
      p2SelectMode=2;
    } else {
      if(idx===selectedCharIdx){p2SelectMode=1;return;}
      selectedChar2Idx=idx;
      p2SelectMode=1;
    }
    buildCharCards();
    var btn=document.getElementById('charStartBtn');
    btn.disabled=false;
    btn.style.background='linear-gradient(135deg,#ff66cc,#4488ff)';
    return;
  }
  selectedCharIdx=idx;
  CHARS.forEach(function(ch,i){
    var card=document.getElementById('charCard'+i);
    if(!card)return;
    var isActive=(i===idx);
    card.classList.toggle('active-char',isActive);
    card.style.borderColor=isActive?ch.color:'transparent';
    card.style.boxShadow=isActive?'0 0 20px '+ch.color:'none';
  });
  var ch=CHARS[idx];
  var btn=document.getElementById('charStartBtn');
  btn.disabled=false;
  btn.style.background='linear-gradient(135deg,'+ch.color+',#7700ff)';
  if(AC.state==='suspended')AC.resume();
}
function openCharSelect(gameIdx){
  if(AC.state==='suspended')AC.resume();
  pendingGameIdx=gameIdx;
  is2P=GAMES[gameIdx].engine.indexOf('2p')===0;
  p2SelectMode=1;
  document.getElementById('modalGameName').textContent=GAMES[gameIdx].icon+' '+GAMES[gameIdx].name;
  if(is2P){
    document.getElementById('modalTitle').textContent='👥 2にんでえらんでね！';
    document.getElementById('modalSub').textContent='1Pと2Pのプリキュアをえらんでね！';
    document.getElementById('charStartBtn').textContent='2にんであそぶ！';
    if(selectedChar2Idx===selectedCharIdx)selectedChar2Idx=(selectedCharIdx+1)%CHARS.length;
  } else {
    document.getElementById('modalTitle').textContent='✨ なかまをえらんでね ✨';
    document.getElementById('modalSub').textContent='いっしょにあそぶプリキュアをえらんでね！';
    document.getElementById('charStartBtn').textContent='このこといっしょにあそぶ！';
    document.getElementById('modal2pInfo').style.display='none';
  }
  buildCharCards();
  var btn=document.getElementById('charStartBtn');
  btn.disabled=false;
  btn.style.background=is2P?'linear-gradient(135deg,#ff66cc,#4488ff)':'linear-gradient(135deg,'+CHARS[selectedCharIdx].color+',#7700ff)';
  document.getElementById('charSelectModal').classList.add('show');
}
function closeCharSelect(){
  document.getElementById('charSelectModal').classList.remove('show');
}
function confirmCharAndStart(){
  closeCharSelect();
  actuallyStartGame(pendingGameIdx);
}

function buildHub(){
  document.getElementById('hubSubtitle').textContent=GAMES.length+'このゲームであそぼう！';
  var tabsEl=document.getElementById('catTabs');

  }).join('');
  var gridEl=document.getElementById('gamesGrid');
  gridEl.innerHTML=GAMES.map(function(g){
    var hidden=(currentCat!=='すべて'&&g.cat!==currentCat)?' hidden':'';
    var isHard=g.cat==='むずかしい';
    var hardBadge=isHard?'<div class="game-hard-badge">難</div>':'';
    return '<div class="game-tile'+(isHard?' hard-tile':'')+hidden+'" onclick="openCharSelect('+(g.id-1)+')">'

function actuallyStartGame(idx){

  document.getElementById('hub').style.display='none';
  document.getElementById('gameScreen').style.display='flex';
  document.getElementById('gameTitleBar').textContent=currentGame.name;
  document.getElementById('scoreBar').textContent=is2P?'🟥0 🟦0':'★0';
  if(!is2P){setupWidget();}
  startBGM(currentGame.cat);
  launchEngine(currentGame);
  if(!is2P){
    gameTimeout(function(){charMsg('start');},700);
    gameInterval(function(){
      if(!document.getElementById('speechBubble').classList.contains('show'))charMsg('cheer');

}

// ============================================================
// さがすゲーム
// ============================================================
function engFind(area,cfg){
  var bg=cfg.bg,item=cfg.item,count=cfg.count;
  var bgDiv=document.createElement('div');bgDiv.className='find-bg';bgDiv.textContent=bg;area.appendChild(bgDiv);
  var fc=document.createElement('div');fc.className='find-counter';fc.id='fc';fc.textContent='のこり：'+count;area.appendChild(fc);
  var left=count,placed=[];
  function placeItem(){
    var el=document.createElement('div');el.className='find-item';el.textContent=item;
    var x,y,tries=0;
    do{x=8+Math.random()*80;y=14+Math.random()*68;tries++;}
    while(placed.some(function(p){return Math.abs(p.x-x)<11&&Math.abs(p.y-y)<11;})&&tries<30);
    placed.push({x:x,y:y});el.style.left=x+'%';el.style.top=y+'%';
    el.onclick=function(e){
      if(el.dataset.found)return;el.dataset.found='1';sfxSuccess();el.classList.add('found');addScore(10);
      var r=area.getBoundingClientRect();floatScoreEl(e.clientX-r.left,e.clientY-r.top,10);
      left--;document.getElementById('fc').textContent='のこり：'+left;
      charMsg('correct');
      gameTimeout(function(){if(el.parentNode)el.remove();if(left<=0)showResult('ぜんぶみつけた！🎉');},400);
    };
    area.appendChild(el);
  }
  for(var i=0;i<count;i++)(function(i){gameTimeout(function(){placeItem();},80+i*140);})(i);
}

// タップゲーム
// ============================================================
function engTap(area,cfg){
  var obj=cfg.obj,bad=cfg.bad,speed=cfg.speed;
  var misses=0,maxMiss=5,running=true;
  var missBar=document.createElement('div');missBar.className='miss-bar';
  missBar.textContent='❌ミス：'+misses+'/'+maxMiss;area.appendChild(missBar);
  function rnd(a,b){return a+Math.floor(Math.random()*(b-a));}
  function spawn(){
    if(!running)return;
    var el=document.createElement('div');el.className='tap-obj';
    var isGood=Math.random()>.28;el.textContent=isGood?obj:bad;
    el.style.left=rnd(4,84)+'%';el.style.top=rnd(14,74)+'%';
    el.style.fontSize=rnd(34,54)+'px';
    area.appendChild(el);
    el.onclick=function(e){
      if(!running||el.dataset.used)return;el.dataset.used='1';
      if(isGood){
        sfxTap();addScore(5);var r=area.getBoundingClientRect();
        floatScoreEl(e.clientX-r.left,e.clientY-r.top,5);
        el.style.animation='scPop .3s ease forwards';charMsg('tap');
      }else{
        sfxMiss();misses++;missBar.textContent='❌ミス：'+misses+'/'+maxMiss;
        flashMiss();charMsg('miss');
        if(misses>=maxMiss){running=false;showResult('よくがんばった！');return;}
      }
      gameTimeout(function(){if(el.parentNode)el.remove();},360);
    };
    var t=speed*(0.65+Math.random()*.7);

  }

    showPattern();

    el.addEventListener('pointerdown',function(){

}

function eng2pCard(area,cfg){
  var pairs=cfg.pairs||6;
  var EMOJIS=['🌸','🌟','💖','🦋','🍭','🎵','🌈','💎','🏆','🦄'];

  }
  updateInfo();
  area.appendChild(info);
  var grid=document.createElement('div');grid.className='card-grid';

    card.onclick=function(){
      if(locked||card.classList.contains('flipped')||card.classList.contains('matched'))return;
      sfxCard();card.classList.add('flipped');flipped.push(card);
      if(flipped.length===2){
        locked=true;
        if(flipped[0].dataset.em===flipped[1].dataset.em){
          sfxSuccess();flipped.forEach(function(c){c.classList.add('matched');});
          if(currentPlayer===1)s1+=20;else s2+=20;
          matched++;flipped=[];locked=false;updateInfo();
          if(matched===pairs)gameTimeout(function(){show2PResult(s1,s2);},400);

          var f=flipped.slice();
          gameTimeout(function(){
            f.forEach(function(c){c.classList.remove('flipped');});
            flipped=[];locked=false;
            currentPlayer=currentPlayer===1?2:1;updateInfo();
          },950);
        }
      }
    };
    grid.appendChild(card);
  });
  area.appendChild(grid);
}

  gameInterval(function(){spawnBalloon(z1,1,P1_BALLOONS[Math.floor(Math.random()*P1_BALLOONS.length)]);},700);
  gameInterval(function(){spawnBalloon(z2,2,P2_BALLOONS[Math.floor(Math.random()*P2_BALLOONS.length)]);},700);
  gameInterval(function(){rem--;timeEl.textContent='⏱'+rem;if(rem<=0){running=false;show2PResult(s1,s2);}},1000);
}

// ============================================================
// スピードさんすう（40秒タイムアタック算数）
// ============================================================
function engSpeedmath(area,cfg){
  var timeLimit=cfg.time||40;
  var correct=0,total=0,running=true,rem=timeLimit;
  area.style.display='flex';area.style.flexDirection='column';area.style.justifyContent='center';area.style.padding='12px';
  function mkQ(){
    var ops=['+','-','×'];
    var op=ops[Math.floor(Math.random()*ops.length)];
    var a,b,ans;
    if(op==='+'){a=Math.floor(Math.random()*50)+1;b=Math.floor(Math.random()*50)+1;ans=a+b;}
    else if(op==='-'){a=Math.floor(Math.random()*50)+10;b=Math.floor(Math.random()*a);ans=a-b;}
    else{a=Math.floor(Math.random()*12)+1;b=Math.floor(Math.random()*12)+1;ans=a*b;}
    var wrongs=[];
    while(wrongs.length<3){var w=ans+Math.floor(Math.random()*10)-5;if(w!==ans&&w>0&&wrongs.indexOf(w)===-1)wrongs.push(w);}
    var choices=[ans].concat(wrongs).sort(function(){return Math.random()-.5;});
    return{q:a+' '+op+' '+b+' = ?',ans:ans,choices:choices};
  }
  function nextQ(){
    area.innerHTML='';
    if(!running){return;}
    var q=mkQ();total++;
    var timeBar=document.createElement('div');
    timeBar.style.cssText='font-size:22px;font-weight:900;color:#ffff44;text-align:center;margin-bottom:8px';
    timeBar.id='smTimer';timeBar.textContent='⏱'+rem+'びょう';
    var scoreDiv=document.createElement('div');
    scoreDiv.style.cssText='font-size:14px;color:#cc99ff;text-align:center;margin-bottom:10px';
    scoreDiv.textContent='✅ '+correct+' もん せいかい！';
    var qDiv=document.createElement('div');
    qDiv.style.cssText='font-size:clamp(28px,8vw,52px);font-weight:900;color:#ffff88;text-align:center;background:#2a005a;padding:18px;border-radius:16px;margin-bottom:16px;border:2px solid #9933ff';
    qDiv.textContent=q.q;
    var btns=document.createElement('div');
    btns.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:340px;margin:0 auto;width:100%';
    q.choices.forEach(function(c){
      var btn=document.createElement('button');btn.className='count-btn';
      btn.style.cssText='width:100%;height:70px;font-size:24px;';
      btn.textContent=c;
      btn.onclick=function(){
        if(!running)return;
        if(c===q.ans){sfxSuccess();addScore(15);correct++;btn.classList.add('correct');}
        else{sfxMiss();btn.classList.add('wrong');}
        gameTimeout(nextQ,300);
      };
      btns.appendChild(btn);
    });
    area.appendChild(timeBar);area.appendChild(scoreDiv);area.appendChild(qDiv);area.appendChild(btns);
    reattachWidget(area);
  }
  nextQ();
  gameInterval(function(){
    rem--;
    var t=document.getElementById('smTimer');if(t)t.textContent='⏱'+rem+'びょう';
    if(t&&rem<=10)t.style.color='#ff4444';
    if(rem<=0){running=false;showResult('せいかい '+correct+' もん！⚡');}
  },1000);
}

    {q:'アルカナ・シャドウのテーマは？',choices:['ひかりとかげ','うみとそら','はなとはな','ほしとつき'],ans:0},

    {q:'まほうをつかうのは？',choices:['キュアミスティック','サンタさん','おかあさん','せんせい'],ans:0},
    {q:'プリキュアがたたかう あいては？',choices:['わるいもの・てき','おかしのくに','さかな','あめ'],ans:0},
    {q:'キュアエクレールのカラーは？',choices:['あか','みどり・ターコイズ','しろ','きいろ'],ans:1},
    {q:'プリキュアはなんの ために たたかう？',choices:['おかねのため','みんなをまもるため','ゆうめいになるため','ゲームのため'],ans:1},
    {q:'なまえのたんていにかかわることば は？',choices:['めいたんてい','まいたんてい','めたんてい','まめたんてい'],ans:0},
  ].sort(function(){return Math.random()-.5;});
  var qNum=0,totalQ=8,score2=0;
  area.style.display='flex';area.style.flexDirection='column';area.style.justifyContent='center';area.style.padding='14px';

    var q=QUESTIONS[qNum];qNum++;
    var prog=document.createElement('div');prog.style.cssText='font-size:12px;color:#cc99ff;text-align:center;margin-bottom:6px';
    prog.textContent=qNum+'/'+totalQ+'もん  ⭐'+score2+'てん';

    qDiv.textContent='🔍 '+q.q;
    var btns=document.createElement('div');
    btns.style.cssText='display:flex;flex-direction:column;gap:9px;max-width:380px;margin:0 auto;width:100%';
    q.choices.forEach(function(c,i){
      var btn=document.createElement('button');
      btn.style.cssText='padding:12px 16px;border-radius:14px;border:3px solid #6633aa;background:linear-gradient(135deg,#2a005a,#440088);color:#fff;font-size:16px;font-weight:700;cursor:pointer;text-align:left;transition:.15s';
      btn.textContent=['🅐 ','🅑 ','🅒 ','🅓 '][i]+c;
      btn.onclick=function(){
        if(i===q.ans){
          sfxSuccess();btn.style.background='linear-gradient(135deg,#006600,#00cc44)';btn.style.borderColor='#00ff66';
          addScore(20);score2+=20;charMsg('correct');gameTimeout(nextQ,700);
        }else{
          sfxMiss();btn.style.background='linear-gradient(135deg,#660000,#cc0044)';btn.style.borderColor='#ff0044';
          charMsg('wrong');gameTimeout(function(){btn.style.background='linear-gradient(135deg,#2a005a,#440088)';btn.style.borderColor='#6633aa';},450);
        }
      };
      btns.appendChild(btn);
    });
    area.appendChild(prog);area.appendChild(qDiv);area.appendChild(btns);reattachWidget(area);
  }
  nextQ();
}
