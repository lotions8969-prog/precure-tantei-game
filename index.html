<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>名探偵プリキュア ゲームランド</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Maru Gothic ProN','BIZ UDPGothic',sans-serif;background:#1a0038;color:#fff;min-height:100vh;overflow-x:hidden}

/* ===== HUB ===== */
#hub{min-height:100vh;padding:0 0 40px}
.hub-header{background:linear-gradient(135deg,#2d0066,#6600cc,#2d0066);padding:16px 20px 10px;text-align:center;box-shadow:0 4px 20px #9900ff88}
.hub-title{font-size:clamp(20px,5vw,36px);font-weight:900;background:linear-gradient(90deg,#ff88ff,#88ffff,#ffff88,#ff88ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200%;animation:gradMove 3s linear infinite}
@keyframes gradMove{to{background-position:200%}}
.hub-subtitle{font-size:13px;color:#cc99ff;margin-top:4px}
.hub-chars{display:flex;justify-content:center;gap:8px;margin-top:10px}
.hub-char{width:60px;height:72px;object-fit:cover;border-radius:12px;border:2px solid #9966ff;filter:drop-shadow(0 0 8px #aa66ff);animation:charB 2s ease-in-out infinite}
.hub-char:nth-child(2){animation-delay:.3s}
.hub-char:nth-child(3){animation-delay:.6s}
.hub-char:nth-child(4){animation-delay:.9s}
@keyframes charB{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.cat-tabs{display:flex;flex-wrap:wrap;gap:6px;padding:12px 16px;justify-content:center;background:#150030}
.cat-tab{padding:6px 14px;border-radius:20px;border:2px solid #6633aa;background:#2a0055;color:#cc99ff;font-size:13px;font-weight:700;cursor:pointer;transition:.2s}
.cat-tab.active,.cat-tab:hover{background:#6633ff;color:#fff;border-color:#aa66ff}
.games-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:14px 14px;max-width:900px;margin:0 auto}
@media(max-width:600px){.games-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:400px){.games-grid{grid-template-columns:repeat(2,1fr)}}
.game-tile{background:linear-gradient(145deg,#2a005a,#440088);border:2px solid #6633aa;border-radius:14px;padding:12px 8px;text-align:center;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.game-tile:hover{transform:scale(1.05);border-color:#aa66ff;box-shadow:0 0 16px #9933ff88}
.game-tile:active{transform:scale(.97)}
.game-tile.hidden{display:none}
.game-icon{font-size:32px;line-height:1;margin-bottom:6px}
.game-name{font-size:11px;font-weight:700;color:#eeddff;line-height:1.3}
.game-num{position:absolute;top:4px;left:6px;font-size:9px;color:#9966cc;font-weight:700}

/* ===== CHARACTER SELECT MODAL ===== */
#charSelectModal{display:none;position:fixed;inset:0;z-index:200;background:#000000cc;align-items:center;justify-content:center;padding:16px}
#charSelectModal.show{display:flex}
.char-select-box{background:linear-gradient(145deg,#1a0040,#330066);border:3px solid #9933ff;border-radius:24px;padding:20px 16px 24px;max-width:460px;width:100%;box-shadow:0 0 40px #9933ff88}
.char-select-title{font-size:20px;font-weight:900;text-align:center;color:#ffccff;margin-bottom:6px}
.char-select-sub{font-size:13px;text-align:center;color:#cc99ff;margin-bottom:16px}
.char-select-game{font-size:15px;font-weight:700;text-align:center;color:#ffff88;margin-bottom:16px;background:#2a005a;border-radius:10px;padding:8px}
.char-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.char-card{border-radius:16px;padding:12px 8px 10px;text-align:center;cursor:pointer;transition:.2s;border:3px solid transparent;background:linear-gradient(145deg,#2a005a,#440077)}
.char-card:hover{transform:scale(1.04)}
.char-card.selected{border-width:3px;box-shadow:0 0 20px var(--glow)}
.char-card img{width:70px;height:84px;object-fit:cover;border-radius:10px;mix-blend-mode:multiply}
.char-card-name{font-size:11px;font-weight:900;margin-top:6px;line-height:1.3}
.char-card-desc{font-size:10px;color:#cc99ff;margin-top:3px;line-height:1.4}
.char-select-start{display:block;width:100%;margin-top:16px;padding:14px;background:linear-gradient(135deg,#ff66cc,#9933ff);border:none;color:#fff;font-size:18px;font-weight:900;border-radius:16px;cursor:pointer;box-shadow:0 0 16px #ff66cc88}
.char-select-start:disabled{background:#443355;color:#776688;cursor:not-allowed;box-shadow:none}
.char-select-cancel{display:block;width:100%;margin-top:8px;padding:8px;background:transparent;border:2px solid #6633aa;color:#cc99ff;font-size:14px;font-weight:700;border-radius:12px;cursor:pointer}

/* ===== GAME SCREEN ===== */
#gameScreen{display:none;min-height:100vh;flex-direction:column}
.game-topbar{background:linear-gradient(135deg,#2d0066,#6600cc);padding:10px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 4px 12px #9900ff66}
.back-btn{background:#ff66cc;border:none;color:#fff;font-size:18px;width:36px;height:36px;border-radius:50%;cursor:pointer;font-weight:900;flex-shrink:0}
.back-btn:hover{background:#ff44aa}
.game-title-bar{font-size:16px;font-weight:900;flex:1;text-align:center;background:linear-gradient(90deg,#ff88ff,#88ffff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.score-bar{font-size:14px;font-weight:700;color:#ffff88;flex-shrink:0}
#gameArea{flex:1;position:relative;overflow:hidden;background:#120028}

/* ===== CHARACTER WIDGET ===== */
#charWidget{position:absolute;bottom:10px;left:10px;z-index:30;display:flex;align-items:flex-end;gap:6px;pointer-events:none}
#charWidget img{width:56px;height:67px;object-fit:cover;border-radius:10px;mix-blend-mode:multiply;cursor:pointer;pointer-events:all;transition:.15s}
#charWidget img:hover{transform:scale(1.08)}
#charWidget img:active{transform:scale(.95)}
#speechBubble{background:#ffffffee;color:#220044;border-radius:16px 16px 16px 4px;padding:8px 12px;font-size:13px;font-weight:700;max-width:180px;line-height:1.5;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 4px 12px #00000044;position:relative}
#speechBubble.show{opacity:1}
#speechBubble::after{content:'';position:absolute;bottom:6px;left:-8px;border:6px solid transparent;border-right-color:#ffffffee}

/* ===== GAME ENGINES ===== */
.find-bg{width:100%;height:100%;position:absolute;top:0;left:0;display:flex;align-items:center;justify-content:center;font-size:90px;opacity:.15;user-select:none}
.find-item{position:absolute;font-size:clamp(28px,5vw,44px);cursor:pointer;user-select:none;transition:.15s;animation:itemPop .3s ease}
.find-item:hover{transform:scale(1.2)}
.find-item.found{animation:scPop .4s ease forwards}
@keyframes itemPop{from{transform:scale(0)}to{transform:scale(1)}}
@keyframes scPop{0%{transform:scale(1)}50%{transform:scale(1.8)}100%{transform:scale(0);opacity:0}}
.find-counter{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);background:#2a005aaa;border-radius:12px;padding:6px 18px;font-size:20px;font-weight:900}
.tap-obj{position:absolute;font-size:clamp(36px,8vw,56px);cursor:pointer;user-select:none;transition:.1s}
.tap-obj:active{transform:scale(.8)}
.miss-flash{position:absolute;top:0;left:0;right:0;bottom:0;background:#ff000033;pointer-events:none;animation:flashFade .3s forwards}
@keyframes flashFade{to{opacity:0}}
.card-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;align-items:center;padding:20px;height:100%;align-content:center}
.card{width:clamp(60px,12vw,90px);height:clamp(75px,15vw,110px);border-radius:12px;background:linear-gradient(135deg,#440088,#220044);border:3px solid #9933ff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:clamp(28px,6vw,44px);transition:.4s transform;transform-style:preserve-3d;position:relative}
.card.flipped{transform:rotateY(180deg)}
.card-back,.card-front{position:absolute;inset:0;border-radius:10px;display:flex;align-items:center;justify-content:center;backface-visibility:hidden}
.card-back{background:linear-gradient(135deg,#440088,#220044);font-size:28px}
.card-front{background:linear-gradient(135deg,#660099,#aa22ff);transform:rotateY(180deg)}
.card.matched{border-color:#ffff44;background:linear-gradient(135deg,#664400,#ff9900);pointer-events:none}
.count-stage{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:20px;gap:16px}
.count-emojis{font-size:clamp(28px,6vw,44px);letter-spacing:4px;line-height:1.6;text-align:center;max-width:90%}
.count-question{font-size:20px;font-weight:900;color:#ffff88;text-align:center}
.count-choices{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.count-btn{width:80px;height:80px;border-radius:50%;border:4px solid #9933ff;background:linear-gradient(135deg,#440088,#6600cc);font-size:28px;font-weight:900;color:#fff;cursor:pointer;transition:.15s}
.count-btn:hover{transform:scale(1.1);background:linear-gradient(135deg,#6600cc,#aa44ff)}
.count-btn.correct{background:linear-gradient(135deg,#006600,#00cc44);border-color:#00ff66}
.count-btn.wrong{background:linear-gradient(135deg,#660000,#cc0044);border-color:#ff0044;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.color-stage{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:20px;padding:20px}
.color-target{width:100px;height:100px;border-radius:50%;border:5px solid #fff;margin:0 auto}
.color-question{font-size:18px;font-weight:700;color:#eeddff;text-align:center}
.color-choices{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.color-btn{width:70px;height:70px;border-radius:50%;border:4px solid #fff;cursor:pointer;transition:.15s}
.color-btn:hover{transform:scale(1.15)}
.piano-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;padding:16px}
.piano-keys{display:flex;gap:6px;justify-content:center}
.pkey{width:clamp(44px,9vw,64px);height:clamp(100px,20vw,150px);border-radius:0 0 10px 10px;border:3px solid #330066;cursor:pointer;transition:.1s;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;font-size:12px;font-weight:700}
.pkey:active,.pkey.pressed{filter:brightness(.7);transform:scaleY(.97)}
.piano-hint{font-size:14px;color:#ffff88;text-align:center}
.rhythm-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:20px;padding:20px}
.rhythm-targets{display:flex;gap:20px;justify-content:center}
.rh-target{width:clamp(60px,14vw,90px);height:clamp(60px,14vw,90px);border-radius:50%;border:4px solid #9933ff;background:#2a005a;font-size:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s}
.rh-target.lit{background:#ff66cc;border-color:#fff;box-shadow:0 0 20px #ff66cc}
.rh-target:active{transform:scale(.9)}
.rhythm-info{font-size:16px;font-weight:700;color:#ffff88;text-align:center}
.balloon{position:absolute;font-size:clamp(40px,9vw,64px);cursor:pointer;animation:floatUp linear infinite;user-select:none}
@keyframes floatUp{from{transform:translateY(0)}to{transform:translateY(-110vh)}}
.whack-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:20px;max-width:400px;margin:0 auto;align-content:center}
.hole{background:#220044;border-radius:50%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:clamp(36px,9vw,56px);cursor:pointer;border:4px solid #6633aa;transition:.1s;overflow:hidden}
.hole.active{background:#440088;border-color:#ff66cc;animation:popUp .15s ease}
@keyframes popUp{from{transform:scale(.3)}to{transform:scale(1)}}
.hole:active{transform:scale(.85)}
.puzzle-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;padding:14px}
.puzzle-board{display:grid;gap:6px;background:#2a005a;padding:10px;border-radius:12px;border:3px solid #9933ff}
.puzzle-piece{border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;border:3px solid transparent;user-select:none}
.puzzle-piece.selected{border-color:#ffff44;transform:scale(1.05)}
.puzzle-piece.empty{background:#110022;cursor:default}
.puzzle-piece:not(.empty):hover{border-color:#aa66ff}
.sort-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:20px;padding:20px}
.sort-items{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;align-items:flex-end}
.sort-item{border-radius:12px;background:linear-gradient(135deg,#440088,#6600cc);border:3px solid #9933ff;cursor:grab;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sort-item.correct-pos{border-color:#00ff66;background:linear-gradient(135deg,#003300,#006600)}
.sort-hint{font-size:14px;color:#cc99ff;text-align:center}
.stamp-wrap{display:flex;flex-direction:column;align-items:center;height:100%;padding:10px;gap:8px}
.stamp-canvas{flex:1;background:#fff0ff;border-radius:12px;border:4px solid #9933ff;width:100%;cursor:crosshair;position:relative;overflow:hidden;min-height:200px}
.stamp-palette{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.stamp-btn{font-size:28px;background:#2a005a;border:3px solid #6633aa;border-radius:10px;padding:4px 8px;cursor:pointer;transition:.15s}
.stamp-btn:hover,.stamp-btn.selected{border-color:#ff66cc;background:#440088;transform:scale(1.1)}
.clear-btn{padding:6px 16px;background:#ff3366;border:3px solid #ff6699;color:#fff;border-radius:10px;cursor:pointer;font-size:13px;font-weight:700}
.result-overlay{position:absolute;inset:0;background:#000000bb;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:50;padding:20px}
.result-title{font-size:clamp(28px,7vw,48px);font-weight:900;background:linear-gradient(90deg,#ff88ff,#ffff44,#88ffff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center}
.result-char-wrap{display:flex;align-items:flex-end;gap:14px}
.result-char-img{width:110px;height:132px;object-fit:cover;border-radius:14px;mix-blend-mode:multiply}
.result-char-msg{background:#ffffffee;color:#220044;border-radius:16px 16px 16px 4px;padding:12px 16px;font-size:15px;font-weight:700;max-width:200px;line-height:1.6;box-shadow:0 4px 12px #00000044}
.result-btn{padding:14px 36px;background:linear-gradient(135deg,#ff66cc,#9933ff);border:none;color:#fff;font-size:20px;font-weight:900;border-radius:30px;cursor:pointer;box-shadow:0 0 20px #ff66cc88}
.result-btn:hover{transform:scale(1.05)}
.confetti{position:absolute;width:8px;height:8px;border-radius:2px;animation:confettiFall linear forwards;pointer-events:none}
@keyframes confettiFall{from{transform:translateY(-10px) rotate(0deg);opacity:1}to{transform:translateY(100vh) rotate(720deg);opacity:0}}
.float-score{position:absolute;font-size:22px;font-weight:900;color:#ffff44;pointer-events:none;animation:floatScore .8s ease forwards;z-index:10}
@keyframes floatScore{from{transform:translateY(0);opacity:1}to{transform:translateY(-60px);opacity:0}}
.pulsBtn{animation:pulsBtn 1.2s ease-in-out infinite}
@keyframes pulsBtn{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
</style>
</head>
<body>

<!-- HUB -->
<div id="hub">
  <div class="hub-header">
    <div class="hub-title">★ 名探偵プリキュア ゲームランド ★</div>
    <div class="hub-subtitle">48このゲームであそぼう！</div>
    <div class="hub-chars">
      <img class="hub-char" src="./imgs/chara01.jpg" alt="キュアアンサー" onerror="this.style.display='none'">
      <img class="hub-char" src="./imgs/chara02.jpg" alt="キュアミスティック" onerror="this.style.display='none'">
      <img class="hub-char" src="./imgs/chara03.jpg" alt="キュアエクレール" onerror="this.style.display='none'">
      <img class="hub-char" src="./imgs/chara04.jpg" alt="キュアアルカナ・シャドウ" onerror="this.style.display='none'">
    </div>
  </div>
  <div class="cat-tabs" id="catTabs"></div>
  <div class="games-grid" id="gamesGrid"></div>
</div>

<!-- CHARACTER SELECT MODAL -->
<div id="charSelectModal">
  <div class="char-select-box">
    <div class="char-select-title">✨ なかまをえらんでね ✨</div>
    <div class="char-select-sub">いっしょにあそぶプリキュアをえらんでね！</div>
    <div class="char-select-game" id="modalGameName">ゲーム</div>
    <div class="char-cards" id="charCards"></div>
    <button class="char-select-start" id="charStartBtn" disabled onclick="confirmCharAndStart()">このこといっしょにあそぶ！</button>
    <button class="char-select-cancel" onclick="closeCharSelect()">もどる</button>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" style="display:flex;flex-direction:column">
  <div class="game-topbar">
    <button class="back-btn" onclick="backToHub()">&#8592;</button>
    <div class="game-title-bar" id="gameTitleBar">ゲーム</div>
    <div class="score-bar" id="scoreBar">★0</div>
    <button id="muteBtn" onclick="toggleMute()" style="background:#44006688;border:2px solid #9933ff;color:#fff;font-size:18px;width:36px;height:36px;border-radius:50%;cursor:pointer;flex-shrink:0">🔊</button>
  </div>
  <div id="gameArea"></div>
</div>

<!-- CHARACTER WIDGET -->
<div id="charWidget" style="display:none">
  <img id="charWidgetImg" src="" alt="" onclick="onWidgetTap()">
  <div id="speechBubble"></div>
</div>

<script>
// ============================================================
// CHARACTER DATA
// ============================================================
var CHARS=[
  {
    name:'キュアアンサー',
    img:'./imgs/chara01.jpg',
    color:'#cc66ff',
    glow:'drop-shadow(0 0 14px #cc66ff)',
    bgColor:'#1a0033',
    desc:'クールでかしこい。\nロジカルなたんてい少女！',
    personality:'answer',
    voice:{pitch:1.1,rate:0.88,volume:1},
    msgs:{
      start:['さあ、ロジカルにいきましょう！いっしょにこたえをみつけましょう！','わたしといっしょなら、どんなナゾもとけます。はじめましょう！','このゲームのこたえは、かならずあります。よくかんがえてね！'],
      correct:['せいかい！すばらしい分析力ですね！','その通り！さすがです！','パーフェクト！ロジカルにとけましたね。','みごとです！わたしもびっくりです！'],
      wrong:['おしいです。もういちどかんがえてみましょう。','だいじょうぶ。ロジカルにかんがえると…きっとわかります！','まちがいは、せいかいへのヒントです。もういちど！'],
      hint:['ヒント：よくみてくださいね！','ちょっとかんがえてみて。こたえはちかくにあるわ。','あきらめないで！わたしがついてます。'],
      cheer:['もうすこし！いいペースですよ！','がんばって！あなたならできます！','よくやってます！このちょうしで！'],
      clear:['みごとです！あなたはほんとうにすばらしいたんてい！','かんぺきな分析力！わたしもほこりに思います！','よくできました！このこたえはかんぺきです！'],
      miss:['おちついて、つぎはいけます！','だいじょうぶ、ロジカルにいきましょう！'],
      tap:['よし！','いいです！','かしこい！']
    }
  },
  {
    name:'キュアミスティック',
    img:'./imgs/chara02.jpg',
    color:'#ff66bb',
    glow:'drop-shadow(0 0 14px #ff66bb)',
    bgColor:'#1a0022',
    desc:'ふしぎなまほう少女。\nきらきらひみつがいっぱい！',
    personality:'mystic',
    voice:{pitch:1.35,rate:0.78,volume:1},
    msgs:{
      start:['ふふ…まほうのじかんがはじまるわ♪ いっしょにあそびましょう！','このゲームには、ふしぎなまほうがかくれてるの。みつけてみて！','星のひかりにみちびかれて…さあ、はじめましょう♪'],
      correct:['きらきら！まほうがひかった！','すてき！あなたにはまほうのちからがあるわ♪','ふふ、さすがね！まほうをかんじましたか？','わあ！ほしがよろこんでるわ♪'],
      wrong:['ふしぎ…つぎはきっとまほうがつかえるわ！','だいじょうぶ、まほうはきえないの。もういちど！','ほしにきいてみて…こたえがきこえるはずよ♪'],
      hint:['まほうのめをひらいてみて♪','ふしぎなヒント：よくみるといいことがあるわ！','しずかにして…ほしのこえがきこえる…？'],
      cheer:['まほうをかんじて！もうすこしよ！','きらきら！いいかんじ♪','ふふ、このちょうし、このちょうし！'],
      clear:['まほうをつかいこなしました！すばらしい！','きらきら！あなたはほんもののまほう少女ね！','ほしたちがよろこんでるわ♪ かんぺきです！'],
      miss:['だいじょうぶ、まほうをわすれないで！','ほしはまだかがやいてるわ！'],
      tap:['きらり！','まほう！','ふふ♪']
    }
  },
  {
    name:'キュアエクレール',
    img:'./imgs/chara03.jpg',
    color:'#44ffcc',
    glow:'drop-shadow(0 0 14px #44ffcc)',
    bgColor:'#001a22',
    desc:'げんきいっぱい！\nあかるく元気なひまわり少女！',
    personality:'eclair',
    voice:{pitch:1.6,rate:1.25,volume:1},

var AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq,dur,type,vol,delay){
  type=type||'sine';vol=vol||.3;delay=delay||0;
  var o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(0,AC.currentTime+delay);
  g.gain.linearRampToValueAtTime(vol,AC.currentTime+delay+.01);
  g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+delay+dur);
  o.start(AC.currentTime+delay);o.stop(AC.currentTime+delay+dur+.05);
}
function sfxSuccess(){beep(523,.1,'square',.3);beep(659,.1,'square',.3,.1);beep(784,.2,'square',.3,.2);}
function sfxMiss(){beep(200,.2,'sawtooth',.3);}
function sfxComplete(){[523,659,784,1047].forEach(function(f,i){beep(f,.15,'square',.3,i*.12);});}
function sfxTap(){beep(880,.05,'square',.2);}
function sfxCard(){beep(660,.1,'sine',.3);}

var bgmTimers=[];var bgmOn=false;
function startBGM(){
  if(bgmOn)return;bgmOn=true;
  var scale=[261,294,330,349,392,440,494,523];
  var melody=[4,4,5,4,3,2,1,1,4,4,5,4,6,5,4,4,3,3,2,6,5,4,3,2];
  var step=0;
  var id=setInterval(function(){if(!bgmOn)return;beep(scale[melody[step%melody.length]],.25,'sine',.1);step++;},350);
  bgmTimers.push(id);
}
function stopBGM(){bgmOn=false;bgmTimers.forEach(clearInterval);bgmTimers=[];}

var voiceMuted=false;
var jaVoice=null;

// 日本語音声を事前に選んでおく
function initVoice(){
  var voices=window.speechSynthesis.getVoices();
  // 日本語女性声を優先順で探す
  var prefs=['Kyoko','O-ren','Otoya','Google 日本語','ja-JP'];
  for(var p=0;p<prefs.length;p++){
    for(var v=0;v<voices.length;v++){
      if(voices[v].name.indexOf(prefs[p])>=0||voices[v].lang.indexOf(prefs[p])>=0){
        jaVoice=voices[v];break;
      }
    }
    if(jaVoice)break;
  }
  // fallbackで日本語lang
  if(!jaVoice){
    for(var v=0;v<voices.length;v++){
      if(voices[v].lang.indexOf('ja')>=0){jaVoice=voices[v];break;}
    }
  }
}
if(window.speechSynthesis){
  window.speechSynthesis.onvoiceschanged=initVoice;
  initVoice();
}

function speak(text){
  if(voiceMuted||!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  var utter=new SpeechSynthesisUtterance(text);
  utter.lang='ja-JP';
  if(jaVoice)utter.voice=jaVoice;
  var vp=CHARS[selectedCharIdx].voice;
  utter.pitch=vp.pitch;
  utter.rate=vp.rate;
  utter.volume=vp.volume;
  window.speechSynthesis.speak(utter);
}

function toggleMute(){
  voiceMuted=!voiceMuted;
  if(voiceMuted&&window.speechSynthesis)window.speechSynthesis.cancel();
  var btn=document.getElementById('muteBtn');
  if(btn)btn.textContent=voiceMuted?'🔇':'🔊';
}

}

  area.style.minHeight='calc(100vh - 60px)';

  if(engines[g.engine])engines[g.engine](area,g.cfg);
  // move widget into gameArea
  var w=document.getElementById('charWidget');
  area.appendChild(w);
  w.style.display='flex';
}

// ============================================================
function engFind(area,cfg){
  var bg=cfg.bg,item=cfg.item,count=cfg.count;
  var bgDiv=document.createElement('div');bgDiv.className='find-bg';bgDiv.textContent=bg;area.appendChild(bgDiv);
  var fc=document.createElement('div');fc.className='find-counter';fc.id='fc';fc.textContent='のこり：'+count;area.appendChild(fc);
  var left=count,placed=[];
  function placeItem(){
    var el=document.createElement('div');el.className='find-item';el.textContent=item;
    var x,y,tries=0;
    do{x=8+Math.random()*80;y=10+Math.random()*70;tries++;}
    while(placed.some(function(p){return Math.abs(p.x-x)<10&&Math.abs(p.y-y)<10;})&&tries<30);
    placed.push({x:x,y:y});el.style.left=x+'%';el.style.top=y+'%';
    el.onclick=function(e){
      if(el.dataset.found)return;el.dataset.found='1';sfxSuccess();el.classList.add('found');addScore(10);
      var r=area.getBoundingClientRect();floatScoreEl(e.clientX-r.left,e.clientY-r.top,10);
      left--;document.getElementById('fc').textContent='のこり：'+left;
      charMsg('correct');
      gameTimeout(function(){el.remove();if(left<=0)showResult('ぜんぶみつけた！🎉');},400);
    };
    area.appendChild(el);
  }
  for(var i=0;i<count;i++)(function(i){gameTimeout(function(){placeItem();},100+i*150);})(i);
}

function engTap(area,cfg){
  var obj=cfg.obj,bad=cfg.bad,speed=cfg.speed;
  var misses=0,maxMiss=5,running=true;
  var info=document.createElement('div');
  info.style.cssText='position:absolute;top:8px;left:50%;transform:translateX(-50%);font-size:13px;color:#cc99ff;background:#2a005aaa;padding:4px 12px;border-radius:10px;z-index:5;';
  info.textContent='×ミス：'+misses+'/'+maxMiss;area.appendChild(info);
  function rnd(a,b){return a+Math.floor(Math.random()*(b-a));}
  function spawn(){
    if(!running)return;
    var el=document.createElement('div');el.className='tap-obj';
    var isGood=Math.random()>.3;el.textContent=isGood?obj:bad;
    el.style.left=rnd(5,85)+'%';el.style.top=rnd(12,75)+'%';
    el.style.fontSize=rnd(36,56)+'px';
    area.appendChild(el);
    el.onclick=function(e){
      if(!running||el.dataset.used)return;el.dataset.used='1';
      if(isGood){sfxTap();addScore(5);var r=area.getBoundingClientRect();floatScoreEl(e.clientX-r.left,e.clientY-r.top,5);el.style.animation='scPop .3s ease forwards';charMsg('tap');}
      else{sfxMiss();misses++;info.textContent='×ミス：'+misses+'/'+maxMiss;flashMiss();charMsg('miss');
        if(misses>=maxMiss){running=false;showResult('よくがんばった！');return;}}
      gameTimeout(function(){el.remove();},350);
    };
    var t=speed*(0.7+Math.random()*.6);
    gameTimeout(function(){
      if(el.parentNode&&isGood&&!el.dataset.used){misses++;info.textContent='×ミス：'+misses+'/'+maxMiss;
        if(misses>=maxMiss){running=false;showResult('よくがんばった！');return;}}
      if(el.parentNode)el.remove();if(running)spawn();},t);
  }
  function flashMiss(){var f=document.createElement('div');f.className='miss-flash';area.appendChild(f);gameTimeout(function(){f.remove();},350);}
  for(var i=0;i<3;i++)(function(i){gameTimeout(spawn,i*400);})(i);
}

// RHYTHM ENGINE

function engRhythm(area,cfg){
  var len=cfg.len,bpm=cfg.bpm;
  var ms=60000/bpm;
  var TARGETS=[{em:'💖',freq:440},{em:'⭐',freq:550},{em:'🌸',freq:660},{em:'✨',freq:880}];
  var pattern=[],playerSeq=[],showing=false,round=0;
  area.style.display='flex';area.style.flexDirection='column';area.style.justifyContent='center';
  var wrap=document.createElement('div');wrap.className='rhythm-wrap';
  wrap.innerHTML='<div class="rhythm-info" id="rhInfo">みてまね！リズムゲーム🎵</div>'
    +'<div style="font-size:13px;color:#cc99ff;text-align:center" id="rhSeq">まもなくはじまります…</div>'
    +'<div class="rhythm-targets">'+TARGETS.map(function(t,i){return '<div class="rh-target" data-i="'+i+'">'+t.em+'</div>';}).join('')+'</div>';
  area.appendChild(wrap);
  function lightUp(i,cb){
    var el=wrap.querySelectorAll('.rh-target')[i];
    el.classList.add('lit');beep(TARGETS[i].freq,.2,'sine',.3);
    gameTimeout(function(){el.classList.remove('lit');if(cb)gameTimeout(cb,ms*.3);},ms*.5);
  }
  function showPattern(){
    showing=true;playerSeq=[];document.getElementById('rhInfo').textContent='みてね！👀';
    var i=0;
    function next(){
      if(i>=pattern.length){showing=false;document.getElementById('rhInfo').textContent='おなじじゅんにおして！';return;}
      lightUp(pattern[i],function(){i++;gameTimeout(next,ms*.2);});
    }
    gameTimeout(next,500);
  }
  function nextRound(){
    round++;pattern=[];for(var i=0;i<Math.min(len,round+1);i++)pattern.push(Math.floor(Math.random()*TARGETS.length));
    showPattern();
  }
  wrap.querySelectorAll('.rh-target').forEach(function(el,i){
    el.addEventListener('pointerdown',function(){
      if(showing)return;lightUp(i,null);playerSeq.push(i);
      var idx=playerSeq.length-1;
      if(playerSeq[idx]!==pattern[idx]){sfxMiss();charMsg('wrong');document.getElementById('rhInfo').textContent='ざんねん！もういちど！';gameTimeout(showPattern,800);playerSeq=[];return;}
      if(playerSeq.length===pattern.length){sfxSuccess();addScore(20);charMsg('correct');document.getElementById('rhInfo').textContent='すごい！🎉';
        if(round>=4)gameTimeout(function(){showResult('リズムマスター！🎶');},600);else gameTimeout(nextRound,800);}
    });
  });
  gameTimeout(nextRound,800);
}

      h.classList.add('active');h.textContent=MOLES[Math.floor(Math.random()*MOLES.length)];

          if(misses>=maxMiss){running=false;showResult('よくがんばった！💪');}}

function engPuzzle(area,cfg){
  var size=cfg.size;
  var n=size*size;
  var EMOJIS=['🌸','⭐','💖','🦋','🍭','🌈','🎵','💎','🏆'];
  var tiles=[];for(var i=0;i<n;i++)tiles.push(i);
  for(var i=tiles.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=tiles[i];tiles[i]=tiles[j];tiles[j]=tmp;}
  var selected=null;
  var tileSize=Math.min(90,Math.floor(300/size));
  area.style.display='flex';area.style.flexDirection='column';area.style.justifyContent='center';
  var pw=document.createElement('div');pw.className='puzzle-wrap';

  pw.appendChild(hint);pw.appendChild(pb);area.appendChild(pw);
  function render(){
    pb.innerHTML='';
    tiles.forEach(function(t,i){
      var el=document.createElement('div');el.className='puzzle-piece';
      el.style.width=tileSize+'px';el.style.height=tileSize+'px';
      el.style.background=t===0?'#110022':'hsl('+(t*40)+',70%,40%)';
      if(t===0){el.classList.add('empty');}
      else{el.style.fontSize=(tileSize*.45)+'px';el.textContent=EMOJIS[(t-1)%EMOJIS.length];}
      if(selected===i)el.classList.add('selected');
      (function(idx,val){
        el.onclick=function(){
          if(val===0)return;
          if(selected===null){selected=idx;}
          else{var tmp2=tiles[selected];tiles[selected]=tiles[idx];tiles[idx]=tmp2;selected=null;sfxCard();
            charMsg('correct');
            if(tiles.every(function(v,j){return v===j;})){sfxComplete();gameTimeout(function(){showResult('パズルかんせい！🧩');},400);}
          }
          render();
        };
      })(i,t);
      pb.appendChild(el);
    });
  }
  render();
}

// ============================================================
// SORT ENGINE
// ============================================================
function engSort(area,cfg){
  var dir=cfg.dir;
  var sizes=[40,56,68,80,96];
  var items=sizes.slice().sort(function(){return Math.random()-.5;});
  var goal=dir==='asc'?sizes.slice().sort(function(a,b){return a-b;}):sizes.slice().sort(function(a,b){return b-a;});
  var EMOJIS=['🍎','⭐','🌸','💎','🏆'];
  area.style.display='flex';area.style.flexDirection='column';area.style.justifyContent='center';
  var wrap=document.createElement('div');wrap.className='sort-wrap';
  var hint=document.createElement('div');hint.className='sort-hint';
  hint.textContent=dir==='asc'?'ちいさいじゅんにならべよう！':'おおきいじゅんにならべよう！';
  var itemsEl=document.createElement('div');itemsEl.className='sort-items';
  wrap.appendChild(hint);wrap.appendChild(itemsEl);area.appendChild(wrap);
  var dragSrc=null;
  function render(){
    itemsEl.innerHTML='';
    items.forEach(function(sz,i){
      var el=document.createElement('div');el.className='sort-item';
      el.style.width=sz+'px';el.style.height=sz+'px';
      el.style.fontSize=(sz*.45)+'px';el.textContent=EMOJIS[i%EMOJIS.length];
      el.dataset.i=i;
      if(items[i]===goal[i])el.classList.add('correct-pos');
      el.draggable=true;
      el.addEventListener('dragstart',function(){dragSrc=i;});
      el.addEventListener('dragover',function(e){e.preventDefault();});
      el.addEventListener('drop',function(){
        if(dragSrc===null||dragSrc===i)return;
        var tmp=items[dragSrc];items[dragSrc]=items[i];items[i]=tmp;dragSrc=null;sfxCard();charMsg('correct');
        if(JSON.stringify(items)===JSON.stringify(goal)){sfxComplete();gameTimeout(function(){showResult('ならべかたマスター！🏆');},400);}
        else render();
      });
      var ts=null;
      el.addEventListener('touchstart',function(){ts=i;},{passive:true});
      el.addEventListener('touchend',function(e){
        var ex=e.changedTouches[0].clientX,ey=e.changedTouches[0].clientY;
        var tgt=document.elementFromPoint(ex,ey);if(tgt)tgt=tgt.closest('.sort-item');
        if(tgt&&tgt!==el){
          var ti=parseInt(tgt.dataset.i);var tmp2=items[ts];items[ts]=items[ti];items[ti]=tmp2;sfxCard();charMsg('correct');
          if(JSON.stringify(items)===JSON.stringify(goal)){sfxComplete();gameTimeout(function(){showResult('ならべかたマスター！🏆');},400);}
          else render();
        }ts=null;
      });
      itemsEl.appendChild(el);
    });
  }
  render();
}

// ============================================================
// STAMP ENGINE
// ============================================================
function engStamp(area,cfg){
  var paint=cfg.paint;
  var STAMPS=paint?['🖌️','✏️','🖊️','🎨']:['🌸','⭐','💖','🦋','🍭','🌈','🎵','💎'];
  var currentStamp=STAMPS[0];
  area.style.display='flex';area.style.flexDirection='column';
  var wrap=document.createElement('div');wrap.className='stamp-wrap';
  var palHTML=STAMPS.map(function(s,i){return '<div class="stamp-btn'+(i===0?' selected':'')+'" data-s="'+s+'">'+s+'</div>';}).join('');
  wrap.innerHTML='<div class="stamp-palette">'+palHTML+'<button class="clear-btn" id="clearBtn">けす</button></div>'
    +'<div class="stamp-canvas"><canvas id="stampCv" style="position:absolute;top:0;left:0;width:100%;height:100%"></canvas></div>'
    +'<div style="font-size:13px;color:#cc99ff;text-align:center">すきなところにおしてかこう！</div>';
  area.appendChild(wrap);
  var canvas=document.getElementById('stampCv');var ctx=canvas.getContext('2d');
  function resize(){canvas.width=canvas.offsetWidth||300;canvas.height=canvas.offsetHeight||200;}
  resize();
  wrap.querySelectorAll('.stamp-btn').forEach(function(btn){
    btn.onclick=function(){currentStamp=btn.dataset.s;wrap.querySelectorAll('.stamp-btn').forEach(function(b){b.classList.remove('selected');});btn.classList.add('selected');};
  });
  document.getElementById('clearBtn').onclick=function(){ctx.clearRect(0,0,canvas.width,canvas.height);};
  var drawCount=0;
  function drawStamp(ex,ey){
    var r=canvas.getBoundingClientRect();
    var sx=canvas.width/r.width,sy=canvas.height/r.height;
    var x=(ex-r.left)*sx,y=(ey-r.top)*sy;
    ctx.font='40px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(currentStamp,x,y);sfxTap();addScore(1);
    document.getElementById('scoreBar').textContent='★'+score;
    drawCount++;if(drawCount%8===0)charMsg('cheer');
  }
  canvas.addEventListener('click',function(e){drawStamp(e.clientX,e.clientY);});
  canvas.addEventListener('touchstart',function(e){e.preventDefault();drawStamp(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
}

document.addEventListener('visibilitychange',function(){if(document.hidden)stopBGM();});
