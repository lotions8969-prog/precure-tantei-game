<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>名探偵プリキュア ゲームランド</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Maru Gothic ProN','BIZ UDPGothic',sans-serif;background:#1a0038;color:#fff;min-height:100vh;overflow-x:hidden}

/* ===== キャラ画像共通 ===== */
/* 白背景ラッパー + mix-blend-mode:multiply で JPEG白抜き */
.ci-wrap{display:inline-block;background:#fff;border-radius:12px;overflow:hidden;line-height:0;vertical-align:bottom}
.ci-wrap img{display:block;object-fit:cover;mix-blend-mode:multiply}

/* ===== HUB ===== */
#hub{min-height:100vh;padding:0 0 40px}
.hub-header{background:linear-gradient(135deg,#2d0066,#6600cc,#2d0066);padding:16px 20px 12px;text-align:center;box-shadow:0 4px 20px #9900ff88}
.hub-title{font-size:clamp(18px,5vw,34px);font-weight:900;background:linear-gradient(90deg,#ff88ff,#88ffff,#ffff88,#ff88ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200%;animation:gradMove 3s linear infinite}
@keyframes gradMove{to{background-position:200%}}
.hub-subtitle{font-size:13px;color:#cc99ff;margin-top:4px}
.hub-chars{display:flex;justify-content:center;gap:10px;margin-top:12px}
.hub-char-wrap{display:inline-block;background:#fff;border-radius:12px;overflow:hidden;line-height:0;border:2px solid #9966ff;filter:drop-shadow(0 0 8px #aa66ff);animation:charB 2s ease-in-out infinite}
.hub-char-wrap:nth-child(2){animation-delay:.3s}
.hub-char-wrap:nth-child(3){animation-delay:.6s}
.hub-char-wrap:nth-child(4){animation-delay:.9s}
.hub-char-wrap img{width:60px;height:72px;object-fit:cover;mix-blend-mode:multiply;display:block}
@keyframes charB{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

.cat-tabs{display:flex;flex-wrap:wrap;gap:6px;padding:12px 16px;justify-content:center;background:#150030}
.cat-tab{padding:6px 14px;border-radius:20px;border:2px solid #6633aa;background:#2a0055;color:#cc99ff;font-size:13px;font-weight:700;cursor:pointer;transition:.2s}
.cat-tab.active,.cat-tab:hover{background:#6633ff;color:#fff;border-color:#aa66ff}
.games-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:14px;max-width:900px;margin:0 auto}
@media(max-width:600px){.games-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:400px){.games-grid{grid-template-columns:repeat(2,1fr)}}
.game-tile{background:linear-gradient(145deg,#2a005a,#440088);border:2px solid #6633aa;border-radius:14px;padding:12px 8px 10px;text-align:center;cursor:pointer;transition:.2s;position:relative}
.game-tile:hover{transform:scale(1.05);border-color:#aa66ff;box-shadow:0 0 16px #9933ff88}
.game-tile:active{transform:scale(.97)}
.game-tile.hidden{display:none}
.game-icon{font-size:30px;line-height:1;margin-bottom:5px}
.game-name{font-size:10px;font-weight:700;color:#eeddff;line-height:1.3}
.game-num{position:absolute;top:4px;left:6px;font-size:9px;color:#9966cc;font-weight:700}

/* ===== キャラクター選択モーダル ===== */
#charSelectModal{display:none;position:fixed;inset:0;z-index:200;background:#000000cc;align-items:center;justify-content:center;padding:16px;overflow-y:auto}
#charSelectModal.show{display:flex}
.char-select-box{background:linear-gradient(145deg,#1a0040,#2a0055);border:3px solid #9933ff;border-radius:24px;padding:20px 16px 24px;max-width:460px;width:100%;box-shadow:0 0 40px #9933ff88}
.char-select-title{font-size:20px;font-weight:900;text-align:center;color:#ffccff;margin-bottom:4px}
.char-select-sub{font-size:13px;text-align:center;color:#cc99ff;margin-bottom:10px}
.char-select-game{font-size:14px;font-weight:700;text-align:center;color:#ffff88;margin-bottom:14px;background:#2a005a;border-radius:10px;padding:8px 10px;border:1px solid #6633aa}
.char-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.char-card{border-radius:16px;padding:12px 8px 10px;text-align:center;cursor:pointer;transition:all .2s;border:3px solid transparent;background:linear-gradient(145deg,#22004a,#380066);position:relative;overflow:hidden}
.char-card:hover{transform:scale(1.03);background:linear-gradient(145deg,#2d0060,#4a0088)}
.char-card.active-char{transform:scale(1.04)}
/* 選択された以外のカードを少し暗くしない → すべて同じ明るさ */
.char-card-img-wrap{display:inline-block;background:#fff;border-radius:10px;overflow:hidden;line-height:0;margin-bottom:6px}
.char-card-img-wrap img{width:72px;height:86px;object-fit:cover;mix-blend-mode:multiply;display:block}
.char-card-name{font-size:12px;font-weight:900;line-height:1.3;margin-bottom:3px}
.char-card-desc{font-size:10px;color:#ccbbee;line-height:1.4}
.char-card .selected-badge{display:none;position:absolute;top:6px;right:6px;background:#ff66cc;color:#fff;font-size:10px;font-weight:900;padding:2px 6px;border-radius:8px}
.char-card.active-char .selected-badge{display:block}
.char-select-start{display:block;width:100%;margin-top:14px;padding:14px;background:linear-gradient(135deg,#ff66cc,#9933ff);border:none;color:#fff;font-size:18px;font-weight:900;border-radius:16px;cursor:pointer;box-shadow:0 0 16px #ff66cc88;transition:.15s}
.char-select-start:disabled{background:#443355;color:#776688;cursor:not-allowed;box-shadow:none}
.char-select-start:not(:disabled):hover{transform:scale(1.02)}
.char-select-cancel{display:block;width:100%;margin-top:8px;padding:9px;background:transparent;border:2px solid #6633aa;color:#cc99ff;font-size:14px;font-weight:700;border-radius:12px;cursor:pointer}
.char-select-cancel:hover{border-color:#9966cc;color:#fff}

/* ===== ゲーム画面 ===== */
#gameScreen{display:none;min-height:100vh;flex-direction:column}
.game-topbar{background:linear-gradient(135deg,#2d0066,#6600cc);padding:9px 14px;display:flex;align-items:center;gap:8px;box-shadow:0 4px 12px #9900ff66;flex-shrink:0}
.back-btn{background:#ff66cc;border:none;color:#fff;font-size:18px;width:34px;height:34px;border-radius:50%;cursor:pointer;font-weight:900;flex-shrink:0;line-height:1}
.back-btn:hover{background:#ff44aa}
.game-title-bar{font-size:15px;font-weight:900;flex:1;text-align:center;background:linear-gradient(90deg,#ff88ff,#88ffff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.score-bar{font-size:14px;font-weight:700;color:#ffff88;flex-shrink:0;white-space:nowrap}
.mute-btn{background:#44006688;border:2px solid #9933ff;color:#fff;font-size:16px;width:34px;height:34px;border-radius:50%;cursor:pointer;flex-shrink:0;transition:.15s}
.mute-btn:hover{background:#6600aa88}
#gameArea{flex:1;position:relative;overflow:hidden}

/* ===== キャラウィジェット ===== */
#charWidget{position:absolute;bottom:10px;left:10px;z-index:30;display:flex;align-items:flex-end;gap:8px}
.widget-img-wrap{display:inline-block;background:#fff;border-radius:10px;overflow:hidden;line-height:0;cursor:pointer;transition:.15s;box-shadow:0 2px 8px #00000066}
.widget-img-wrap:hover{transform:scale(1.08)}
.widget-img-wrap:active{transform:scale(.93)}
.widget-img-wrap img{width:54px;height:65px;object-fit:cover;mix-blend-mode:multiply;display:block}
#speechBubble{background:#fffffff0;color:#220044;border-radius:16px 16px 16px 4px;padding:8px 11px;font-size:12px;font-weight:700;max-width:170px;line-height:1.5;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 3px 10px #00000055;position:relative}
#speechBubble.show{opacity:1}
#speechBubble::after{content:'';position:absolute;bottom:8px;left:-7px;border:6px solid transparent;border-right-color:#fffffff0}
#speechBubble .char-name-tag{font-size:10px;font-weight:900;margin-bottom:3px;opacity:.7}

/* ===== 各ゲーム共通 ===== */
.find-bg{width:100%;height:100%;position:absolute;top:0;left:0;display:flex;align-items:center;justify-content:center;font-size:90px;opacity:.15;user-select:none;pointer-events:none}
.find-item{position:absolute;font-size:clamp(28px,5vw,44px);cursor:pointer;user-select:none;animation:itemPop .3s ease}
.find-item:hover{transform:scale(1.2)}
.find-item.found{animation:scPop .4s ease forwards;pointer-events:none}
@keyframes itemPop{from{transform:scale(0)}to{transform:scale(1)}}
@keyframes scPop{0%{transform:scale(1)}50%{transform:scale(1.8)}100%{transform:scale(0);opacity:0}}
.find-counter{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:#2a005acc;border-radius:12px;padding:5px 16px;font-size:18px;font-weight:900;z-index:5}

.tap-obj{position:absolute;font-size:clamp(36px,8vw,56px);cursor:pointer;user-select:none}
.tap-obj:active{transform:scale(.8)}
.miss-bar{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:13px;color:#ffcccc;background:#2a005acc;padding:4px 12px;border-radius:10px;z-index:5;white-space:nowrap}
.miss-flash{position:absolute;inset:0;background:#ff000033;pointer-events:none;animation:flashFade .3s forwards;z-index:20}
@keyframes flashFade{to{opacity:0}}

.card-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:center;padding:16px;align-content:center;width:100%}
.card{width:clamp(58px,12vw,88px);height:clamp(72px,15vw,108px);border-radius:12px;background:linear-gradient(135deg,#440088,#220044);border:3px solid #9933ff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:clamp(26px,6vw,42px);transition:.4s transform;transform-style:preserve-3d;position:relative;flex-shrink:0}
.card.flipped{transform:rotateY(180deg)}
.card-back,.card-front{position:absolute;inset:0;border-radius:10px;display:flex;align-items:center;justify-content:center;backface-visibility:hidden}
.card-back{background:linear-gradient(135deg,#440088,#220044)}
.card-front{background:linear-gradient(135deg,#660099,#aa22ff);transform:rotateY(180deg)}
.card.matched{border-color:#ffff44;background:linear-gradient(135deg,#664400,#ff9900);pointer-events:none}

.count-stage{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;padding:20px;gap:14px}
.count-emojis{font-size:clamp(26px,5.5vw,42px);letter-spacing:4px;line-height:1.7;text-align:center;max-width:92%}
.count-question{font-size:19px;font-weight:900;color:#ffff88;text-align:center}
.count-choices{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.count-btn{width:76px;height:76px;border-radius:50%;border:4px solid #9933ff;background:linear-gradient(135deg,#440088,#6600cc);font-size:26px;font-weight:900;color:#fff;cursor:pointer;transition:.15s;flex-shrink:0}
.count-btn:hover{transform:scale(1.1)}
.count-btn.correct{background:linear-gradient(135deg,#006600,#00cc44)!important;border-color:#00ff66!important}
.count-btn.wrong{background:linear-gradient(135deg,#660000,#cc0044)!important;border-color:#ff0044!important;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

.color-stage{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;gap:18px;padding:20px}
.color-target{width:90px;height:90px;border-radius:50%;border:5px solid #fff;box-shadow:0 0 16px currentColor;margin:0 auto}
.color-question{font-size:17px;font-weight:700;color:#eeddff;text-align:center}
.color-choices{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.color-btn{width:66px;height:66px;border-radius:50%;border:4px solid rgba(255,255,255,.4);cursor:pointer;transition:.15s;flex-shrink:0}
.color-btn:hover{transform:scale(1.15);border-color:#fff}

.piano-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;gap:14px;padding:14px}
.piano-keys{display:flex;gap:5px;justify-content:center}
.pkey{width:clamp(42px,9vw,62px);height:clamp(95px,18vw,140px);border-radius:0 0 10px 10px;border:3px solid #330066;cursor:pointer;transition:.1s;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;font-size:11px;font-weight:900;color:#fff;text-shadow:0 1px 3px #000;flex-shrink:0}
.pkey:active,.pkey.pressed{filter:brightness(.65);transform:scaleY(.96)}
.piano-hint{font-size:13px;color:#ffff88;text-align:center;font-weight:700}
#pianoMsg{font-size:18px;color:#cc99ff;text-align:center;min-height:28px;font-weight:700}

.rhythm-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;gap:18px;padding:18px}
.rhythm-targets{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.rh-target{width:clamp(62px,14vw,86px);height:clamp(62px,14vw,86px);border-radius:50%;border:4px solid #9933ff;background:#2a005a;font-size:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s;flex-shrink:0;user-select:none}
.rh-target.lit{background:#ff66cc;border-color:#fff;box-shadow:0 0 20px #ff66cc}
.rh-target:active{transform:scale(.88)}
.rhythm-info{font-size:17px;font-weight:900;color:#ffff88;text-align:center}

.balloon{position:absolute;font-size:clamp(38px,8vw,60px);cursor:pointer;animation:floatUp linear;user-select:none}
@keyframes floatUp{from{transform:translateY(0)}to{transform:translateY(-110vh)}}

.whack-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px;max-width:380px;margin:0 auto}
.hole{background:#220044;border-radius:50%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:clamp(34px,8vw,52px);cursor:pointer;border:4px solid #6633aa;overflow:hidden;transition:.1s;user-select:none}
.hole.active{background:#440088;border-color:#ff66cc;animation:popUp .15s ease}
@keyframes popUp{from{transform:scale(.2)}to{transform:scale(1)}}
.hole:active{transform:scale(.84)}

.puzzle-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;gap:12px;padding:12px}
.puzzle-board{display:grid;gap:5px;background:#2a005a;padding:8px;border-radius:12px;border:3px solid #9933ff}
.puzzle-piece{border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;border:3px solid transparent;user-select:none}
.puzzle-piece.selected{border-color:#ffff44;transform:scale(1.06)}
.puzzle-piece.empty{background:#110022!important;cursor:default}
.puzzle-piece:not(.empty):hover{border-color:#aa66ff}

.sort-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;gap:16px;padding:16px}
.sort-items{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;align-items:flex-end}
.sort-item{border-radius:12px;background:linear-gradient(135deg,#440088,#6600cc);border:3px solid #9933ff;cursor:grab;display:flex;align-items:center;justify-content:center;flex-shrink:0;user-select:none;transition:.15s}
.sort-item.correct-pos{border-color:#00ff66;background:linear-gradient(135deg,#003300,#006600)}
.sort-hint{font-size:14px;color:#cc99ff;text-align:center;font-weight:700}

.stamp-wrap{display:flex;flex-direction:column;align-items:center;height:100%;padding:10px;gap:8px}
.stamp-canvas-container{flex:1;background:#fff0ff;border-radius:12px;border:3px solid #9933ff;width:100%;position:relative;overflow:hidden;min-height:180px}
.stamp-canvas-container canvas{position:absolute;inset:0;width:100%;height:100%;cursor:crosshair}
.stamp-palette{display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
.stamp-btn{font-size:26px;background:#2a005a;border:3px solid #6633aa;border-radius:10px;padding:4px 7px;cursor:pointer;transition:.15s;line-height:1}
.stamp-btn:hover,.stamp-btn.selected{border-color:#ff66cc;background:#440088;transform:scale(1.1)}
.clear-btn{padding:6px 14px;background:#ff3366;border:3px solid #ff6699;color:#fff;border-radius:10px;cursor:pointer;font-size:12px;font-weight:700}

/* ===== リザルト ===== */
.result-overlay{position:absolute;inset:0;background:#000000bb;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:50;padding:20px;overflow-y:auto}
.result-title{font-size:clamp(26px,7vw,46px);font-weight:900;background:linear-gradient(90deg,#ff88ff,#ffff44,#88ffff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;line-height:1.2}
.result-char-row{display:flex;align-items:flex-end;gap:12px}
.result-char-img-wrap{display:inline-block;background:#fff;border-radius:14px;overflow:hidden;line-height:0}
.result-char-img-wrap img{width:100px;height:120px;object-fit:cover;mix-blend-mode:multiply;display:block}
.result-char-msg{background:#ffffffee;color:#220044;border-radius:16px 16px 16px 4px;padding:11px 14px;font-size:14px;font-weight:700;max-width:190px;line-height:1.6;box-shadow:0 3px 10px #00000044}
.result-score{font-size:26px;font-weight:900;color:#ffff44}
.result-btn{padding:12px 32px;background:linear-gradient(135deg,#ff66cc,#9933ff);border:none;color:#fff;font-size:18px;font-weight:900;border-radius:28px;cursor:pointer;box-shadow:0 0 18px #ff66cc88;transition:.15s}
.result-btn:hover{transform:scale(1.05)}
.result-btn.retry{background:linear-gradient(135deg,#33cc66,#006633)}
.confetti{position:absolute;width:8px;height:8px;border-radius:2px;animation:confettiFall linear forwards;pointer-events:none}
@keyframes confettiFall{from{transform:translateY(-10px) rotate(0deg);opacity:1}to{transform:translateY(100vh) rotate(720deg);opacity:0}}

.float-score{position:absolute;font-size:20px;font-weight:900;color:#ffff44;pointer-events:none;animation:floatScore .8s ease forwards;z-index:15;text-shadow:0 2px 4px #000}
@keyframes floatScore{from{transform:translateY(0);opacity:1}to{transform:translateY(-55px);opacity:0}}
.pulsBtn{animation:pulsBtn 1.2s ease-in-out infinite}
@keyframes pulsBtn{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
</style>
</head>
<body>

<!-- ===== HUB ===== -->
<div id="hub">
  <div class="hub-header">
    <div class="hub-title">★ 名探偵プリキュア ゲームランド ★</div>
    <div class="hub-subtitle">48このゲームであそぼう！</div>
    <div class="hub-chars">
      <div class="hub-char-wrap"><img src="./imgs/chara01.jpg" alt="キュアアンサー" onerror="this.parentNode.style.display='none'"></div>
      <div class="hub-char-wrap"><img src="./imgs/chara02.jpg" alt="キュアミスティック" onerror="this.parentNode.style.display='none'"></div>
      <div class="hub-char-wrap"><img src="./imgs/chara03.jpg" alt="キュアエクレール" onerror="this.parentNode.style.display='none'"></div>
      <div class="hub-char-wrap"><img src="./imgs/chara04.jpg" alt="キュアアルカナ・シャドウ" onerror="this.parentNode.style.display='none'"></div>
    </div>
  </div>
  <div class="cat-tabs" id="catTabs"></div>
  <div class="games-grid" id="gamesGrid"></div>
</div>

<!-- ===== キャラクター選択モーダル ===== -->
<div id="charSelectModal">
  <div class="char-select-box">
    <div class="char-select-title">✨ なかまをえらんでね ✨</div>
    <div class="char-select-sub">いっしょにあそぶプリキュアをえらんでね！</div>
    <div class="char-select-game" id="modalGameName"></div>
    <div class="char-cards" id="charCards"></div>
    <button class="char-select-start" id="charStartBtn" disabled onclick="confirmCharAndStart()">このこといっしょにあそぶ！</button>
    <button class="char-select-cancel" onclick="closeCharSelect()">もどる &#8592;</button>
  </div>
</div>

<!-- ===== ゲーム画面 ===== -->
<div id="gameScreen" style="display:flex;flex-direction:column;min-height:100vh">
  <div class="game-topbar">
    <button class="back-btn" onclick="backToHub()">&#8592;</button>
    <div class="game-title-bar" id="gameTitleBar">ゲーム</div>
    <div class="score-bar" id="scoreBar">★0</div>
    <button class="mute-btn" id="muteBtn" onclick="toggleMute()" title="おとのオン/オフ">🔊</button>
  </div>
  <div id="gameArea" style="flex:1;position:relative;overflow:hidden"></div>
</div>

<!-- ===== キャラウィジェット（gameAreaの子として動的配置） ===== -->
<div id="charWidget" style="display:none">
  <div class="widget-img-wrap" onclick="onWidgetTap()">
    <img id="charWidgetImg" src="" alt="">
  </div>
  <div id="speechBubble">
    <div class="char-name-tag" id="bubbleNameTag"></div>
    <div id="bubbleText"></div>
  </div>
</div>

<script>
// ============================================================
// キャラクターデータ
// ※実際のアニメ声優の音声は著作権上使用できないため、
//   Web Speech API で各キャラの個性を最大限に表現しています。
// ============================================================
var CHARS=[
  {
    name:'キュアアンサー',
    img:'./imgs/chara01.jpg',
    color:'#cc66ff',
    glow:'drop-shadow(0 0 12px #cc66ff)',
    bgColor:'#160030',
    desc:'クールでかしこい。\nロジカルなたんてい少女！',
    personality:'answer',
    voice:{pitch:1.15,rate:0.93,volume:1},
    msgs:{

var AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq,dur,type,vol,delay){
  type=type||'sine';vol=vol||.3;delay=delay||0;
  var o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(0,AC.currentTime+delay);
  g.gain.linearRampToValueAtTime(vol,AC.currentTime+delay+.01);
  g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+delay+dur);
  o.start(AC.currentTime+delay);o.stop(AC.currentTime+delay+dur+.05);
}
function sfxSuccess(){beep(523,.1,'square',.28);beep(659,.1,'square',.28,.1);beep(784,.2,'square',.28,.2);}
function sfxMiss(){beep(180,.25,'sawtooth',.25);}
function sfxComplete(){[523,659,784,1047].forEach(function(f,i){beep(f,.18,'square',.28,i*.13);});}
function sfxTap(){beep(880,.05,'square',.18);}
function sfxCard(){beep(660,.1,'sine',.28);}

// 音声システム
// キャラクター固有の「音楽モチーフ」＋ 日本語TTS（利用可能な場合のみ）
// ※実際のアニメ声優の音声は著作権のため使用不可
// ============================================================
var voiceMuted=false;
var jaVoice=null;
var ttsAvailable=false;

// --- キャラクター音楽モチーフ定義 ---
// 各キャラの個性を音で表現（Web Audio API）
var CHAR_MOTIFS=[
  // キュアアンサー：クール・論理的 → 澄んだ高音のアルペジオ
  {notes:[659,784,988,1047],dur:0.10,type:'triangle',vol:0.22,gap:0.10},
  // キュアミスティック：神秘的 → 揺らぐビブラートの和音
  {notes:[523,659,784],dur:0.30,type:'sine',vol:0.18,gap:0.15,vibrato:true},
  // キュアエクレール：元気 → 跳ねるような高速ファンファーレ
  {notes:[784,988,1047,1319],dur:0.07,type:'square',vol:0.16,gap:0.06},
  // キュアアルカナ・シャドウ：クール・謎 → 低く重なる不思議な和音
  {notes:[196,247,294],dur:0.35,type:'sawtooth',vol:0.15,gap:0.18}
];

function playMotif(charIdx, done){
  var m=CHAR_MOTIFS[charIdx];
  m.notes.forEach(function(freq,i){
    var start=i*m.gap;
    var o=AC.createOscillator(), g=AC.createGain();
    if(m.vibrato){
      var lfo=AC.createOscillator(), lgain=AC.createGain();
      lfo.frequency.value=5.5; lgain.gain.value=8;
      lfo.connect(lgain); lgain.connect(o.frequency);
      lfo.start(AC.currentTime+start); lfo.stop(AC.currentTime+start+m.dur+0.1);
    }
    o.type=m.type; o.frequency.value=freq;
    o.connect(g); g.connect(AC.destination);
    g.gain.setValueAtTime(0, AC.currentTime+start);
    g.gain.linearRampToValueAtTime(m.vol, AC.currentTime+start+0.02);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+start+m.dur+0.05);
    o.start(AC.currentTime+start);
    o.stop(AC.currentTime+start+m.dur+0.1);
  });
  var totalDur=(m.notes.length-1)*m.gap+m.dur+0.15;
  if(done) setTimeout(done, totalDur*1000);
}

// --- TTS初期化（日本語音声がある場合のみ有効） ---
function initVoice(){
  if(!window.speechSynthesis)return;
  var voices=window.speechSynthesis.getVoices();
  if(!voices||voices.length===0)return;
  // 高品質な日本語音声を優先探索
  var pref=['Kyoko','O-ren','Otoya','Google 日本語','Google Japan','ja-JP','ja_JP'];
  for(var p=0;p<pref.length;p++){
    for(var v=0;v<voices.length;v++){
      var vn=voices[v].name||''; var vl=voices[v].lang||'';
      if(vn.indexOf(pref[p])>=0||vl.indexOf(pref[p])>=0){
        jaVoice=voices[v]; ttsAvailable=true; break;
      }
    }
    if(jaVoice)break;
  }
  // fallback: lang が ja で始まるもの
  if(!jaVoice){
    for(var v=0;v<voices.length;v++){
      if((voices[v].lang||'').indexOf('ja')===0){jaVoice=voices[v];ttsAvailable=true;break;}
    }
  }
  // 日本語音声が見つからない場合は TTS を無効化（英語読みを防ぐ）
  if(!jaVoice) ttsAvailable=false;
}
if(window.speechSynthesis){
  window.speechSynthesis.onvoiceschanged=initVoice;
  setTimeout(initVoice,200); // 一部ブラウザは遅延が必要
}

function speak(text, charIdx){
  if(voiceMuted) return;
  var idx=(charIdx!==undefined)?charIdx:selectedCharIdx;
  // モチーフを先に鳴らしてからTTS
  playMotif(idx, ttsAvailable ? function(){
    if(voiceMuted||!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(text);
    u.lang='ja-JP';
    if(jaVoice)u.voice=jaVoice;
    var vp=CHARS[idx].voice;
    u.pitch=vp.pitch; u.rate=vp.rate; u.volume=0.9;
    window.speechSynthesis.speak(u);
  } : null);
}
function speakAs(idx,text){ speak(text,idx); }

function toggleMute(){
  voiceMuted=!voiceMuted;
  if(voiceMuted&&window.speechSynthesis)window.speechSynthesis.cancel();
  document.getElementById('muteBtn').textContent=voiceMuted?'🔇':'🔊';
}

  // キャラ選択時：モチーフ → あいさつ

function buildHub(){

function actuallyStartGame(idx){

  document.getElementById('gameScreen').style.display='flex';
  document.getElementById('gameTitleBar').textContent=currentGame.name;
  document.getElementById('scoreBar').textContent='★0';
  setupWidget();
  startBGM();
  launchEngine(currentGame);
  gameTimeout(function(){charMsg('start');},700);
  gameInterval(function(){
    if(!document.getElementById('speechBubble').classList.contains('show'))charMsg('cheer');

}
function backToHub(){
  clearAllGameTimers();stopBGM();
  if(window.speechSynthesis)window.speechSynthesis.cancel();
  if(bubbleTimer)clearTimeout(bubbleTimer);
  var w=document.getElementById('charWidget');
  w.style.display='none';
  document.getElementById('speechBubble').classList.remove('show');
  document.getElementById('gameScreen').style.display='none';
  document.getElementById('hub').style.display='block';
  document.getElementById('gameArea').innerHTML='';

// さがすゲーム
// ============================================================
function engFind(area,cfg){
  var bg=cfg.bg,item=cfg.item,count=cfg.count;
  var bgDiv=document.createElement('div');bgDiv.className='find-bg';bgDiv.textContent=bg;area.appendChild(bgDiv);
  var fc=document.createElement('div');fc.className='find-counter';fc.id='fc';fc.textContent='のこり：'+count;area.appendChild(fc);
  var left=count,placed=[];
  function placeItem(){
    var el=document.createElement('div');el.className='find-item';el.textContent=item;
    var x,y,tries=0;
    do{x=8+Math.random()*80;y=14+Math.random()*68;tries++;}
    while(placed.some(function(p){return Math.abs(p.x-x)<11&&Math.abs(p.y-y)<11;})&&tries<30);
    placed.push({x:x,y:y});el.style.left=x+'%';el.style.top=y+'%';
    el.onclick=function(e){
      if(el.dataset.found)return;el.dataset.found='1';sfxSuccess();el.classList.add('found');addScore(10);
      var r=area.getBoundingClientRect();floatScoreEl(e.clientX-r.left,e.clientY-r.top,10);
      left--;document.getElementById('fc').textContent='のこり：'+left;
      charMsg('correct');
      gameTimeout(function(){if(el.parentNode)el.remove();if(left<=0)showResult('ぜんぶみつけた！🎉');},400);
    };
    area.appendChild(el);
  }
  for(var i=0;i<count;i++)(function(i){gameTimeout(function(){placeItem();},80+i*140);})(i);
}

// ============================================================
// タップゲーム
// ============================================================
function engTap(area,cfg){
  var obj=cfg.obj,bad=cfg.bad,speed=cfg.speed;
  var misses=0,maxMiss=5,running=true;
  var missBar=document.createElement('div');missBar.className='miss-bar';
  missBar.textContent='❌ミス：'+misses+'/'+maxMiss;area.appendChild(missBar);
  function rnd(a,b){return a+Math.floor(Math.random()*(b-a));}
  function spawn(){
    if(!running)return;
    var el=document.createElement('div');el.className='tap-obj';
    var isGood=Math.random()>.28;el.textContent=isGood?obj:bad;
    el.style.left=rnd(4,84)+'%';el.style.top=rnd(14,74)+'%';
    el.style.fontSize=rnd(34,54)+'px';
    area.appendChild(el);
    el.onclick=function(e){
      if(!running||el.dataset.used)return;el.dataset.used='1';
      if(isGood){
        sfxTap();addScore(5);var r=area.getBoundingClientRect();
        floatScoreEl(e.clientX-r.left,e.clientY-r.top,5);
        el.style.animation='scPop .3s ease forwards';charMsg('tap');
      }else{
        sfxMiss();misses++;missBar.textContent='❌ミス：'+misses+'/'+maxMiss;
        flashMiss();charMsg('miss');
        if(misses>=maxMiss){running=false;showResult('よくがんばった！');return;}
      }
      gameTimeout(function(){if(el.parentNode)el.remove();},360);
    };
    var t=speed*(0.65+Math.random()*.7);
    gameTimeout(function(){
      if(el.parentNode&&isGood&&!el.dataset.used){
        misses++;missBar.textContent='❌ミス：'+misses+'/'+maxMiss;
        if(misses>=maxMiss){running=false;showResult('よくがんばった！');return;}
      }
      if(el.parentNode)el.remove();if(running)spawn();
    },t);
  }
  function flashMiss(){var f=document.createElement('div');f.className='miss-flash';area.appendChild(f);gameTimeout(function(){if(f.parentNode)f.remove();},350);}
  for(var i=0;i<3;i++)(function(i){gameTimeout(spawn,i*380);})(i);
}

function engCard(area,cfg){
  var pairs=cfg.pairs;
  var EMOJIS=['🌸','🌟','💖','🦋','🍭','🎵','🌈','💎','🏆','🦄'];
  var deck=EMOJIS.slice(0,pairs).concat(EMOJIS.slice(0,pairs)).sort(function(){return Math.random()-.5;});
  var flipped=[],matched=0,locked=false;
  area.style.display='flex';area.style.flexDirection='column';area.style.justifyContent='center';
  var grid=document.createElement('div');grid.className='card-grid';
  deck.forEach(function(em){
    var card=document.createElement('div');card.className='card';card.dataset.em=em;
    card.innerHTML='<div class="card-back">✨</div><div class="card-front">'+em+'</div>';
    card.onclick=function(){
      if(locked||card.classList.contains('flipped')||card.classList.contains('matched'))return;
      sfxCard();card.classList.add('flipped');flipped.push(card);
      if(flipped.length===2){
        locked=true;
        if(flipped[0].dataset.em===flipped[1].dataset.em){
          sfxSuccess();flipped.forEach(function(c){c.classList.add('matched');});
          addScore(20);matched++;flipped=[];locked=false;charMsg('correct');
          if(matched===pairs)gameTimeout(function(){showResult('ぜんぶそろった！🎉');},400);
        }else{
          var f=flipped.slice();charMsg('wrong');
          gameTimeout(function(){f.forEach(function(c){c.classList.remove('flipped');});flipped=[];locked=false;},950);
        }
      }
    };
    grid.appendChild(card);
  });
  area.appendChild(grid);
  reattachWidget(area);
}

          else{sfxMiss();btn.classList.add('wrong');charMsg('wrong');gameTimeout(function(){btn.classList.remove('wrong');},420);}
        };
        cc.appendChild(btn);
      });
      return;
    }else{
      var a3=1+Math.floor(Math.random()*maxN);var b3=1+Math.floor(Math.random()*maxN);
      emojisHTML=em.repeat(a3)+' + '+em.repeat(b3);question='あわせていくつ？';correct=a3+b3;
      choices=[a3+b3];while(choices.length<4){var r2=1+Math.floor(Math.random()*(maxN*2+1));if(choices.indexOf(r2)===-1)choices.push(r2);}
      choices.sort(function(){return Math.random()-.5;});
    }
    wrap.innerHTML='<div style="font-size:12px;color:#cc99ff">'+qNum+'/'+totalQ+'</div><div class="count-emojis">'+emojisHTML+'</div><div class="count-question">'+question+'</div><div class="count-choices" id="cc"></div>';
    area.appendChild(wrap);reattachWidget(area);

    choices.forEach(function(ch3){
      var btn=document.createElement('button');btn.className='count-btn';btn.textContent=ch3;
      btn.onclick=function(){
        if(ch3===correct){sfxSuccess();btn.classList.add('correct');addScore(15);charMsg('correct');gameTimeout(nextQ,650);}
        else{sfxMiss();btn.classList.add('wrong');charMsg('wrong');gameTimeout(function(){btn.classList.remove('wrong');},420);}
      };
      cc3.appendChild(btn);
    });
  }

}

function engColor(area,cfg){
  var mode=cfg.mode;

  var SHAPES=['🔵','🟥','🟡','🟢','🟣','🟠','🔴','🔷'];

    area.innerHTML='';reattachWidget(area);
    if(qNum>=totalQ){showResult('いろのてんさい！🎉');return;}
    qNum++;

    var qLabel='<div style="font-size:12px;color:#cc99ff;align-self:flex-start">'+qNum+'/'+totalQ+'</div>';
    if(mode==='color'){
      var ti=Math.floor(Math.random()*COLORS.length);

      ci.sort(function(){return Math.random()-.5;});

        btn.onclick=function(){

          else{sfxMiss();charMsg('wrong');}
        };
        cc.appendChild(btn);
      });
      wrap.appendChild(cc);
    }else if(mode==='shape'){
      var ti2=Math.floor(Math.random()*SHAPES.length);
      var si=[ti2];while(si.length<4){var r2=Math.floor(Math.random()*SHAPES.length);if(si.indexOf(r2)===-1)si.push(r2);}
      si.sort(function(){return Math.random()-.5;});
      wrap.innerHTML=qLabel+'<div style="font-size:78px;text-align:center">'+SHAPES[ti2]+'</div><div class="color-question">このかたちをさがせ！</div>';
      var cc2=document.createElement('div');cc2.className='count-choices';
      si.forEach(function(s2){
        var btn=document.createElement('button');btn.className='count-btn';btn.style.fontSize='30px';btn.textContent=SHAPES[s2];
        btn.onclick=function(){
          if(s2===ti2){sfxSuccess();btn.classList.add('correct');addScore(15);charMsg('correct');gameTimeout(nextQ,650);}
          else{sfxMiss();btn.classList.add('wrong');charMsg('wrong');gameTimeout(function(){btn.classList.remove('wrong');},420);}
        };
        cc2.appendChild(btn);
      });
      wrap.appendChild(cc2);
    }else if(mode==='same'){
      var em=FRUITS[Math.floor(Math.random()*FRUITS.length)];
      var others=FRUITS.filter(function(f){return f!==em;}).sort(function(){return Math.random()-.5;}).slice(0,2);
      var items=[em,em,others[0],others[1]].sort(function(){return Math.random()-.5;});
      wrap.innerHTML=qLabel+'<div class="color-question">おなじものをふたつえらんで！</div>';
      var cc3=document.createElement('div');cc3.className='count-choices';var picked=[];
      items.forEach(function(f){
        var btn=document.createElement('button');btn.className='count-btn';btn.style.fontSize='34px';btn.dataset.f=f;btn.textContent=f;

          if(picked.length===2){

            else{sfxMiss();charMsg('wrong');picked.forEach(function(b){b.classList.add('wrong');delete b.dataset.picked;b.style.outline='';});picked=[];}

    }else{
      var pool=FRUITS.slice(0,6).sort(function(){return Math.random()-.5;}).slice(0,4);
      var ti3=Math.floor(Math.random()*4);
      var ref=pool[ti3===0?1:0];
      var items2=pool.map(function(f,i){return i===ti3?pool[(ti3+2)%4]:ref;});

          else{sfxMiss();btn.classList.add('wrong');charMsg('wrong');gameTimeout(function(){btn.classList.remove('wrong');},420);}
        };
        cc4.appendChild(btn);
      });
      wrap.appendChild(cc4);
    }
    area.appendChild(wrap);reattachWidget(area);
  }
  nextQ();
}

function engRhythm(area,cfg){
  var len=cfg.len,bpm=cfg.bpm;
  var ms=60000/bpm;
  var TARGETS=[{em:'💖',freq:440},{em:'⭐',freq:550},{em:'🌸',freq:660},{em:'✨',freq:880}];
  var pattern=[],playerSeq=[],showing=false,round=0;

    +'<div style="font-size:13px;color:#cc99ff;text-align:center;min-height:20px" id="rhSeq">まもなくはじまります…</div>'
    +'<div class="rhythm-targets">'+TARGETS.map(function(t,i){return '<div class="rh-target" data-i="'+i+'">'+t.em+'</div>';}).join('')+'</div>';

  function lightUp(i,cb){
    var el=wrap.querySelectorAll('.rh-target')[i];
    el.classList.add('lit');beep(TARGETS[i].freq,.22,'sine',.32);
    gameTimeout(function(){el.classList.remove('lit');if(cb)gameTimeout(cb,ms*.28);},ms*.52);
  }
  function showPattern(){
    showing=true;playerSeq=[];document.getElementById('rhInfo').textContent='みてね！👀';
    var i=0;
    function next(){
      if(i>=pattern.length){showing=false;document.getElementById('rhInfo').textContent='おなじじゅんにおして！';return;}
      lightUp(pattern[i],function(){i++;gameTimeout(next,ms*.2);});
    }
    gameTimeout(next,500);
  }
  function nextRound(){
    round++;pattern=[];
    for(var i=0;i<Math.min(len,round+1);i++)pattern.push(Math.floor(Math.random()*TARGETS.length));
    showPattern();
  }
  wrap.querySelectorAll('.rh-target').forEach(function(el,i){
    el.addEventListener('pointerdown',function(){
      if(showing)return;lightUp(i,null);playerSeq.push(i);
      var idx=playerSeq.length-1;
      if(playerSeq[idx]!==pattern[idx]){sfxMiss();charMsg('wrong');document.getElementById('rhInfo').textContent='ざんねん！もういちど！';gameTimeout(showPattern,850);playerSeq=[];return;}
      if(playerSeq.length===pattern.length){sfxSuccess();addScore(20);charMsg('correct');document.getElementById('rhInfo').textContent='すごい！🎉';
        if(round>=4)gameTimeout(function(){showResult('リズムマスター！🎶');},620);else gameTimeout(nextRound,820);}
    });
  });
  gameTimeout(nextRound,800);
}

// ============================================================
// ふうせんゲーム
// ============================================================
function engBalloon(area,cfg){
  var speed=cfg.speed,colorMode=cfg.colorMode,ghost=cfg.ghost,rainbow=cfg.rainbow;
  var popped=0,target=15;
  var BALLOONS=ghost?['👻','💀','😱']:rainbow?['🎈','🎀','🎊','🎉','🌈']:colorMode?['🔴','🟡','🟢','🔵','🟣']:['🎈','🎀','🎊'];
  var info=document.createElement('div');
  info.style.cssText='position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:16px;font-weight:900;color:#ffff88;z-index:5;background:#2a005acc;padding:5px 16px;border-radius:12px;white-space:nowrap';
  info.textContent='💥 '+popped+'/'+target;area.appendChild(info);
  function spawn(){
    var el=document.createElement('div');el.className='balloon';
    el.textContent=BALLOONS[Math.floor(Math.random()*BALLOONS.length)];
    el.style.left=(4+Math.random()*86)+'%';el.style.bottom='-70px';
    var dur=(speed+Math.random()*2.5)+'s';
    el.style.animationDuration=dur;el.style.animationFillMode='forwards';
    area.appendChild(el);
    el.onclick=function(e){
      sfxTap();addScore(5);popped++;info.textContent='💥 '+popped+'/'+target;
      var r=area.getBoundingClientRect();floatScoreEl(e.clientX-r.left,e.clientY-r.top,5);
      el.style.animation='scPop .3s ease forwards';
      gameTimeout(function(){if(el.parentNode)el.remove();},360);
      if(popped%5===0)charMsg('cheer');
      if(popped>=target)showResult('ぜんぶわった！🎈');
    };
    gameTimeout(function(){if(el.parentNode)el.remove();},(parseFloat(dur)+.6)*1000);
  }
  gameInterval(spawn,580);
  reattachWidget(area);
}

// ============================================================
// もぐらたたき
// ============================================================
function engWhack(area,cfg){
  var speed=cfg.speed,animals=cfg.animals,hearts=cfg.hearts;
  var MOLES=hearts?['💗','💖','💕','💝']:animals?['🐰','🐹','🐭','🐱']:['🐹','😊','⭐','💎'];
  var misses=0,maxMiss=10,running=true,hits=0;
  var info=document.createElement('div');
  info.style.cssText='position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:14px;color:#ffff88;background:#2a005acc;padding:4px 14px;border-radius:10px;z-index:5;white-space:nowrap';
  info.textContent='❌'+misses+'/'+maxMiss;area.appendChild(info);
  var grid=document.createElement('div');grid.className='whack-grid';grid.style.paddingTop='50px';
  var holes=[];
  for(var i=0;i<9;i++){var h=document.createElement('div');h.className='hole';holes.push(h);grid.appendChild(h);}
  area.appendChild(grid);reattachWidget(area);
  function show(){
    if(!running)return;
    var avail=holes.filter(function(h){return !h.classList.contains('active');});
    if(avail.length>0){
      var h=avail[Math.floor(Math.random()*avail.length)];
      h.classList.add('active');h.textContent=MOLES[Math.floor(Math.random()*MOLES.length)];
      var hRef=h;
      hRef.onclick=function(){
        if(!hRef.classList.contains('active'))return;
        sfxTap();addScore(10);hRef.classList.remove('active');hRef.textContent='';hits++;
        var r=area.getBoundingClientRect(),hr=hRef.getBoundingClientRect();
        floatScoreEl(hr.left-r.left+30,hr.top-r.top,10);
        if(hits%5===0)charMsg('cheer');
      };
      gameTimeout(function(){
        if(hRef.classList.contains('active')){hRef.classList.remove('active');hRef.textContent='';
          misses++;info.textContent='❌'+misses+'/'+maxMiss;
          if(misses>=maxMiss){running=false;showResult('よくがんばった！💪');}}
      },speed);
    }
    if(running)gameTimeout(show,280+Math.random()*380);
  }
  show();
}

// ============================================================
// パズル
// ============================================================
function engPuzzle(area,cfg){
  var size=cfg.size;
  var n=size*size;
  var EMOJIS=['🌸','⭐','💖','🦋','🍭','🌈','🎵','💎','🏆'];
  var tiles=[];for(var i=0;i<n;i++)tiles.push(i);
  for(var i=tiles.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=tiles[i];tiles[i]=tiles[j];tiles[j]=tmp;}
  var selected=null;
  var tileSize=Math.min(88,Math.floor(290/size));
  area.style.display='flex';area.style.flexDirection='column';area.style.justifyContent='center';
  var pw=document.createElement('div');pw.className='puzzle-wrap';
  var hint=document.createElement('div');hint.style.cssText='font-size:13px;color:#cc99ff;text-align:center;font-weight:700';hint.textContent='いれかえてそろえよう！';
  var pb=document.createElement('div');pb.className='puzzle-board';pb.style.gridTemplateColumns='repeat('+size+',1fr)';
  pw.appendChild(hint);pw.appendChild(pb);area.appendChild(pw);reattachWidget(area);
  function render(){
    pb.innerHTML='';
    tiles.forEach(function(t,i){
      var el=document.createElement('div');el.className='puzzle-piece';
      el.style.width=tileSize+'px';el.style.height=tileSize+'px';
      el.style.background=t===0?'#110022':'hsl('+(t*42)+',68%,38%)';
      if(t===0){el.classList.add('empty');}
      else{el.style.fontSize=Math.round(tileSize*.44)+'px';el.textContent=EMOJIS[(t-1)%EMOJIS.length];}
      if(selected===i)el.classList.add('selected');
      (function(idx,val){
        el.onclick=function(){
          if(val===0)return;
          if(selected===null){selected=idx;}
          else{
            var tmp2=tiles[selected];tiles[selected]=tiles[idx];tiles[idx]=tmp2;
            selected=null;sfxCard();charMsg('correct');
            if(tiles.every(function(v,j){return v===j;})){sfxComplete();gameTimeout(function(){showResult('パズルかんせい！🧩');},420);}
          }
          render();
        };
      })(i,t);
      pb.appendChild(el);
    });
  }
  render();
}

// ============================================================
// ならべかえ
// ============================================================
function engSort(area,cfg){
  var dir=cfg.dir;
  var sizes=[40,56,68,80,96];
  var items=sizes.slice().sort(function(){return Math.random()-.5;});
  var goal=dir==='asc'?sizes.slice().sort(function(a,b){return a-b;}):sizes.slice().sort(function(a,b){return b-a;});
  var EMOJIS=['🍎','⭐','🌸','💎','🏆'];
  area.style.display='flex';area.style.flexDirection='column';area.style.justifyContent='center';
  var wrap=document.createElement('div');wrap.className='sort-wrap';
  var hint=document.createElement('div');hint.className='sort-hint';
  hint.textContent=dir==='asc'?'ちいさいじゅんにならべよう！':'おおきいじゅんにならべよう！';
  var itemsEl=document.createElement('div');itemsEl.className='sort-items';
  wrap.appendChild(hint);wrap.appendChild(itemsEl);area.appendChild(wrap);reattachWidget(area);
  var dragSrc=null;
  function render(){
    itemsEl.innerHTML='';
    items.forEach(function(sz,i){
      var el=document.createElement('div');el.className='sort-item';
      el.style.width=sz+'px';el.style.height=sz+'px';
      el.style.fontSize=Math.round(sz*.44)+'px';el.textContent=EMOJIS[i%EMOJIS.length];
      el.dataset.i=i;
      if(items[i]===goal[i])el.classList.add('correct-pos');
      el.draggable=true;
      el.addEventListener('dragstart',function(){dragSrc=i;el.style.opacity='.5';});
      el.addEventListener('dragend',function(){el.style.opacity='1';});
      el.addEventListener('dragover',function(e){e.preventDefault();});
      el.addEventListener('drop',function(){
        if(dragSrc===null||dragSrc===i)return;
        var tmp=items[dragSrc];items[dragSrc]=items[i];items[i]=tmp;dragSrc=null;sfxCard();charMsg('correct');
        if(JSON.stringify(items)===JSON.stringify(goal)){sfxComplete();gameTimeout(function(){showResult('ならべかたマスター！🏆');},420);}
        else render();
      });
      var ts=null;
      el.addEventListener('touchstart',function(){ts=i;el.style.opacity='.6';},{passive:true});
      el.addEventListener('touchend',function(e){
        el.style.opacity='1';
        var ex=e.changedTouches[0].clientX,ey=e.changedTouches[0].clientY;
        var tgt=document.elementFromPoint(ex,ey);if(tgt)tgt=tgt.closest('.sort-item');
        if(tgt&&tgt!==el){
          var ti=parseInt(tgt.dataset.i);var tmp2=items[ts];items[ts]=items[ti];items[ti]=tmp2;sfxCard();charMsg('correct');
          if(JSON.stringify(items)===JSON.stringify(goal)){sfxComplete();gameTimeout(function(){showResult('ならべかたマスター！🏆');},420);}
          else render();
        }ts=null;
      });
      itemsEl.appendChild(el);
    });
  }
  render();
}

// ============================================================
// スタンプ / お絵かき
// ============================================================
function engStamp(area,cfg){
  var paint=cfg.paint;
  var STAMPS=paint?['🖌️','✏️','🖊️','🎨','❤️','⭐']:['🌸','⭐','💖','🦋','🍭','🌈','🎵','💎'];
  var currentStamp=STAMPS[0];
  area.style.display='flex';area.style.flexDirection='column';
  var wrap=document.createElement('div');wrap.className='stamp-wrap';
  var palHTML=STAMPS.map(function(s,i){return '<div class="stamp-btn'+(i===0?' selected':'')+'" data-s="'+s+'">'+s+'</div>';}).join('');
  wrap.innerHTML='<div class="stamp-palette">'+palHTML+'<button class="clear-btn" id="clearBtn">けす</button></div>'
    +'<div class="stamp-canvas-container"><canvas id="stampCv"></canvas></div>'
    +'<div style="font-size:12px;color:#cc99ff;text-align:center">すきなところにおしてかこう！</div>';
  area.appendChild(wrap);reattachWidget(area);
  var canvas=document.getElementById('stampCv');var ctx=canvas.getContext('2d');
  function resize(){
    var p=canvas.parentNode;
    canvas.width=p.offsetWidth||300;canvas.height=p.offsetHeight||200;
  }
  resize();
  wrap.querySelectorAll('.stamp-btn').forEach(function(btn){
    btn.onclick=function(){
      currentStamp=btn.dataset.s;
      wrap.querySelectorAll('.stamp-btn').forEach(function(b){b.classList.remove('selected');});
      btn.classList.add('selected');
    };
  });
  document.getElementById('clearBtn').onclick=function(){ctx.clearRect(0,0,canvas.width,canvas.height);};
  var drawCount=0;
  function drawAt(ex,ey){
    var r=canvas.getBoundingClientRect();
    var sx=canvas.width/r.width,sy=canvas.height/r.height;
    ctx.font=Math.round(42*Math.min(sx,sy))+'px serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(currentStamp,(ex-r.left)*sx,(ey-r.top)*sy);
    sfxTap();addScore(1);document.getElementById('scoreBar').textContent='★'+score;
    drawCount++;if(drawCount%8===0)charMsg('cheer');
  }
  canvas.addEventListener('click',function(e){drawAt(e.clientX,e.clientY);});
  canvas.addEventListener('touchstart',function(e){e.preventDefault();drawAt(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
}
